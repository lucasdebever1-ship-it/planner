<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Vakken</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 360px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }
    .nav-link { font-size: 0.85rem; color: #4f8ef7; text-decoration: none; }
    .nav-link:hover { text-decoration: underline; }

    .form-panel {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .form-rij { display: flex; gap: 10px; margin-bottom: 10px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.7px; }
    .form-group.flex1 { flex: 1; }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    select:focus { border-color: #4f8ef7; }
    select { appearance: none; }
    input[type="number"] { width: 80px; }

    .btn-primary {
      width: 100%;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #3a7ef0; }

    #lijst { display: flex; flex-direction: column; gap: 16px; }

    .kaart {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 18px;
      transition: border-color 0.15s;
    }
    .kaart:hover { border-color: #303030; }
    .kaart.bewerkrij { border-color: #4f8ef7; }

    .kaart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
    }
    .kaart-titel { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
    .vak-naam {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .moeilijkheid-badge {
      font-size: 0.68rem;
      font-weight: 700;
      color: #4f8ef7;
      background: #192840;
      border-radius: 20px;
      padding: 3px 9px;
      flex-shrink: 0;
    }

    .acties { display: flex; gap: 2px; flex-shrink: 0; }
    .acties button {
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 7px;
      padding: 7px 9px;
      font-size: 1rem;
      color: #444;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .acties .edit:hover      { color: #4f8ef7; background: #192840; }
    .acties .add-toets       { color: #4f8ef7; font-size: 1.3rem; font-weight: 400; }
    .acties .add-toets:hover { background: #192840; }
    .acties .delete:hover    { color: #e05252; background: #2d1818; }
    .acties .opslaan         { color: #3dcc7a; font-size: 1.1rem; }
    .acties .opslaan:hover   { background: #182d20; }
    .acties .annuleer        { color: #444; font-size: 1.1rem; }
    .acties .annuleer:hover  { color: #888; }

    .kaart.bewerkrij .b-naam         { flex: 1; }
    .kaart.bewerkrij .b-moeilijkheid { width: 65px; }

    /* Toetsen */
    .toetsen-grid { display: flex; flex-direction: column; gap: 10px; }

    .toets-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #192840;
      border: 1px solid #1e3558;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.88rem;
      color: #7fb3ff;
    }
    .toets-chip-naam { flex: 1; }
    .toets-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #2a4870;
      font-size: 0.75rem;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .toets-delete:hover { color: #e05252; }

    .leeradvies   { font-size: 0.78rem; color: #3dcc7a; margin-top: 3px; padding-left: 2px; }
    .geen-toetsen { font-size: 0.85rem; color: #333; }

    .toets-type-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #888;
      background: #1e1e1e;
      border-radius: 20px;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    /* Toets form */
    .toets-formrij {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toets-formrij-knoppen { display: flex; gap: 8px; }
    .toets-formrij .btn-save {
      flex: 1;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toets-formrij .btn-save:hover { background: #3a7ef0; }
    .toets-formrij .btn-cancel {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 9px 14px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .toets-formrij .btn-cancel:hover { color: #aaa; }

    /* ── Huiswerk ── */
    .huiswerk-sectie {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #1e1e1e;
    }

    .sectie-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 8px;
    }

    .geen-hw { font-size: 0.82rem; color: #333; margin-bottom: 8px; display: block; }

    .huiswerk-lijst {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .huiswerk-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border: 1px solid #242424;
      border-radius: 8px;
      padding: 8px 10px;
      transition: opacity 0.2s;
    }
    .huiswerk-item.gedaan { opacity: 0.4; }
    .huiswerk-item.gedaan .hw-omschrijving { text-decoration: line-through; color: #555; }

    .hw-vink {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #2e2e2e;
      background: none;
      color: transparent;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1;
      padding: 0;
    }
    .hw-vink:hover   { border-color: #3dcc7a; color: #3dcc7a; }
    .hw-vink.gevinkd { border-color: #3dcc7a; background: #0f2a1a; color: #3dcc7a; }

    .hw-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .hw-omschrijving {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hw-datum { font-size: 0.73rem; color: #555; }

    .hw-delete {
      flex-shrink: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: #2a2a2a;
      font-size: 0.73rem;
      padding: 4px 6px;
      line-height: 1;
      transition: color 0.15s;
    }
    .hw-delete:hover { color: #e05252; }

    .btn-add-hw {
      width: 100%;
      background: none;
      border: 1px dashed #282828;
      border-radius: 8px;
      color: #444;
      font-size: 0.82rem;
      padding: 7px 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-hw:hover { border-color: #454545; color: #888; }

    /* Huiswerk form */
    .hw-formrij {
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hw-weekdag-info { font-size: 0.78rem; color: #3dcc7a; padding-left: 2px; }
    .hw-formrij-knoppen { display: flex; gap: 8px; }
    .hw-formrij .btn-save {
      flex: 1;
      background: #2a7a45;
      color: #d4f5e4;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .hw-formrij .btn-save:hover { background: #236638; }
    .hw-formrij .btn-cancel {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      color: #666;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 9px 14px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .hw-formrij .btn-cancel:hover { color: #aaa; }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Vakken</h1>
    <a href="overzicht.html" class="nav-link">Overzicht →</a>
  </div>

  <div class="form-panel">
    <form id="form">
      <div class="form-rij">
        <div class="form-group flex1">
          <label for="naam">Naam vak</label>
          <input type="text" id="naam" placeholder="Bijv. Wiskunde" required>
        </div>
        <div class="form-group">
          <label for="moeilijkheid">Moeilijkheid</label>
          <input type="number" id="moeilijkheid" placeholder="1–10" min="1" max="10" required>
        </div>
      </div>
      <button type="submit" class="btn-primary">Vak toevoegen</button>
    </form>
  </div>

  <div id="lijst"></div>

  <script>
    const sleutel = 'vakken';
    const dagNamen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

    function eerstvolgendeWeekdag(dagNr) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      const diff = (dagNr - d.getDay() + 7) % 7;
      // diff === 0 means today — return today so it shows immediately
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function laad() {
      const vakken = JSON.parse(localStorage.getItem(sleutel) || '[]');
      const vandaag = new Date();
      vandaag.setHours(0, 0, 0, 0);
      let veranderd = false;

      const result = vakken.map(v => {
        // Migreer oud formaat
        if (!v.toetsen) {
          v.toetsen = v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : [];
          delete v.toetsdatum;
        }
        if (!v.huiswerk) v.huiswerk = [];

        // Cleanup: verwijder afgevinkt éénmalig huiswerk na inleverdatum
        // Terugkerend huiswerk: reset naar volgende week
        v.huiswerk = v.huiswerk.filter(h => {
          if (!h.inleverdatum) return true;
          const datum = new Date(h.inleverdatum);
          datum.setHours(0, 0, 0, 0);
          if (h.gedaan && datum < vandaag) {
            if (h.weekdag != null) {
              h.gedaan = false;
              h.inleverdatum = eerstvolgendeWeekdag(h.weekdag);
              veranderd = true;
              return true;
            }
            veranderd = true;
            return false;
          }
          return true;
        });
        return v;
      });

      if (veranderd) localStorage.setItem(sleutel, JSON.stringify(result));
      return result;
    }

    function sla(vakken) {
      localStorage.setItem(sleutel, JSON.stringify(vakken));
    }

    function formatDatum(d) {
      return d ? new Date(d + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' }) : '—';
    }

    const STANDAARD_DAGEN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0, Schrijfvaardigheid:2, PO:14, Anders:3 };

    function getLeerDagen(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key = type || 'Anders';
      const basis = inst[key] !== undefined ? inst[key] : (STANDAARD_DAGEN[key] !== undefined ? STANDAARD_DAGEN[key] : STANDAARD_DAGEN.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function berekenBeginDatum(datum, type, moeilijkheid) {
      if (!datum) return null;
      const dagen = getLeerDagen(type, moeilijkheid);
      if (dagen === 0) return null;
      const d = new Date(datum);
      d.setDate(d.getDate() - dagen);
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
    }

    function renderToetsen(toetsen, moeilijkheid, i) {
      if (!toetsen.length) {
        return '<span class="geen-toetsen">Nog geen toetsen — gebruik + om er een toe te voegen</span>';
      }
      return '<div class="toetsen-grid">' + toetsen.map((t, j) => {
        const begin = berekenBeginDatum(t.datum, t.type, moeilijkheid);
        return `
          <div class="toets-chip-group">
            <div class="toets-chip">
              <span class="toets-chip-naam">${t.naam} · ${formatDatum(t.datum)}</span>
              ${t.type ? `<span class="toets-type-label">${t.type}</span>` : ''}
              <button class="toets-delete" data-i="${i}" data-j="${j}" title="Verwijder toets">✕</button>
            </div>
            ${begin ? `<div class="leeradvies">📚 Begin op ${begin}</div>` : ''}
          </div>`;
      }).join('') + '</div>';
    }

    function renderHuiswerk(huiswerk, i) {
      let html = '<div class="huiswerk-sectie"><div class="sectie-label">Huiswerk</div>';

      if (huiswerk.length) {
        html += '<div class="huiswerk-lijst">';
        huiswerk.forEach((h, j) => {
          const datumTekst = h.inleverdatum ? formatDatum(h.inleverdatum) : '—';
          const herhalTekst = h.weekdag != null ? ` · elke ${dagNamen[h.weekdag].toLowerCase()}` : '';
          html += `
            <div class="huiswerk-item${h.gedaan ? ' gedaan' : ''}">
              <button class="hw-vink${h.gedaan ? ' gevinkd' : ''}" data-i="${i}" data-j="${j}" title="${h.gedaan ? 'Markeer als niet gedaan' : 'Markeer als gedaan'}">✓</button>
              <div class="hw-info">
                <span class="hw-omschrijving">${h.omschrijving}</span>
                <span class="hw-datum">📅 ${datumTekst}${herhalTekst}</span>
              </div>
              <button class="hw-delete" data-i="${i}" data-j="${j}" title="Verwijder">✕</button>
            </div>`;
        });
        html += '</div>';
      } else {
        html += '<span class="geen-hw">Nog geen huiswerk</span>';
      }

      html += `<button class="btn-add-hw" data-i="${i}">📋 Huiswerk toevoegen</button></div>`;
      return html;
    }

    function sluitForms() {
      document.querySelectorAll('.toets-formrij, .hw-formrij').forEach(r => r.remove());
    }

    function render() {
      const vakken = laad();
      sluitForms();
      document.getElementById('lijst').innerHTML = vakken.map((v, i) => `
        <div class="kaart" data-i="${i}">
          <div class="kaart-header">
            <div class="kaart-titel">
              <span class="vak-naam">${v.naam}</span>
              <span class="moeilijkheid-badge">${v.moeilijkheid} / 10</span>
            </div>
            <div class="acties">
              <button class="edit"      data-i="${i}" title="Vak bewerken">&#x270F;</button>
              <button class="add-toets" data-i="${i}" title="Toets toevoegen">+</button>
              <button class="delete"    data-i="${i}" title="Vak verwijderen">&#x2715;</button>
            </div>
          </div>
          ${renderToetsen(v.toetsen, v.moeilijkheid, i)}
          ${renderHuiswerk(v.huiswerk, i)}
        </div>
      `).join('');
    }

    function toonToetsForm(i) {
      sluitForms();
      const kaart = document.querySelector(`.kaart[data-i="${i}"]`);
      const formDiv = document.createElement('div');
      formDiv.className = 'toets-formrij';
      formDiv.innerHTML = `
        <input type="text" class="t-naam" placeholder="Naam toets (bijv. hoofdstuk 3)">
        <select class="t-type">
          <option value="Proefwerk">Proefwerk</option>
          <option value="SO">SO</option>
          <option value="Mondeling">Mondeling</option>
          <option value="Luistertoets">Luistertoets</option>
          <option value="Schrijfvaardigheid">Schrijfvaardigheid</option>
          <option value="PO">PO</option>
          <option value="Anders">Anders</option>
        </select>
        <input type="date" class="t-datum">
        <div class="toets-formrij-knoppen">
          <button class="toets-opslaan btn-save" data-i="${i}">&#x2713; Opslaan</button>
          <button class="toets-annuleer btn-cancel">&#x2715;</button>
        </div>`;
      kaart.appendChild(formDiv);
      formDiv.querySelector('.t-naam').focus();
    }

    function slaToetsOp(i) {
      const formDiv = document.querySelector('.toets-formrij');
      const naam  = formDiv.querySelector('.t-naam').value.trim();
      const type  = formDiv.querySelector('.t-type').value;
      const datum = formDiv.querySelector('.t-datum').value || null;
      if (!naam) { formDiv.querySelector('.t-naam').focus(); return; }
      const vakken = laad();
      vakken[i].toetsen.push({ naam, type, datum });
      sla(vakken);
      render();
    }

    function toonHuiswerkForm(i) {
      sluitForms();
      const kaart  = document.querySelector(`.kaart[data-i="${i}"]`);
      const sectie = kaart.querySelector('.huiswerk-sectie');
      const addBtn = sectie.querySelector('.btn-add-hw');

      const formDiv = document.createElement('div');
      formDiv.className = 'hw-formrij';
      formDiv.innerHTML = `
        <input type="text" class="hw-oms" placeholder="Omschrijving huiswerk">
        <select class="hw-wdag">
          <option value="">Eenmalig (kies datum)</option>
          <option value="1">Altijd maandag</option>
          <option value="2">Altijd dinsdag</option>
          <option value="3">Altijd woensdag</option>
          <option value="4">Altijd donderdag</option>
          <option value="5">Altijd vrijdag</option>
          <option value="6">Altijd zaterdag</option>
          <option value="0">Altijd zondag</option>
        </select>
        <input type="date" class="hw-datum-input">
        <div class="hw-weekdag-info" style="display:none"></div>
        <div class="hw-formrij-knoppen">
          <button class="hw-opslaan btn-save" data-i="${i}">✓ Opslaan</button>
          <button class="hw-annuleer btn-cancel">✕</button>
        </div>`;

      sectie.insertBefore(formDiv, addBtn);

      const select     = formDiv.querySelector('.hw-wdag');
      const datumInput = formDiv.querySelector('.hw-datum-input');
      const info       = formDiv.querySelector('.hw-weekdag-info');

      select.addEventListener('change', () => {
        if (select.value === '') {
          datumInput.style.display = '';
          info.style.display = 'none';
        } else {
          datumInput.style.display = 'none';
          const datum = eerstvolgendeWeekdag(parseInt(select.value));
          info.textContent = '📅 Eerst op: ' + new Date(datum + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
          info.style.display = '';
        }
      });

      formDiv.querySelector('.hw-oms').focus();
    }

    function slaHuiswerkOp(i) {
      const formDiv     = document.querySelector('.hw-formrij');
      const omschrijving = formDiv.querySelector('.hw-oms').value.trim();
      const weekdagVal  = formDiv.querySelector('.hw-wdag').value;
      const datumVal    = formDiv.querySelector('.hw-datum-input').value;

      if (!omschrijving) { formDiv.querySelector('.hw-oms').focus(); return; }

      let weekdag = null;
      let inleverdatum = null;

      if (weekdagVal !== '') {
        weekdag = parseInt(weekdagVal);
        inleverdatum = eerstvolgendeWeekdag(weekdag);
      } else {
        inleverdatum = datumVal || null;
      }

      const vakken = laad();
      vakken[i].huiswerk.push({ id: Date.now(), omschrijving, inleverdatum, weekdag, gedaan: false });
      sla(vakken);
      render();
    }

    function startBewerken(i) {
      const vakken = laad();
      const v = vakken[i];
      sluitForms();
      const kaart = document.querySelector(`.kaart[data-i="${i}"]`);
      kaart.classList.add('bewerkrij');
      kaart.innerHTML = `
        <div class="kaart-header">
          <div class="kaart-titel" style="flex:1;gap:8px">
            <input type="text"   class="b-naam"         value="${v.naam}" required>
            <input type="number" class="b-moeilijkheid" value="${v.moeilijkheid}" min="1" max="10" required>
          </div>
          <div class="acties">
            <button class="opslaan"  data-i="${i}" title="Opslaan">&#x2713;</button>
            <button class="annuleer" data-i="${i}" title="Annuleren">&#x2715;</button>
          </div>
        </div>
        ${renderToetsen(v.toetsen, v.moeilijkheid, i)}
        ${renderHuiswerk(v.huiswerk, i)}`;
      kaart.querySelector('.b-naam').focus();
    }

    function slaBewerkingenOp(i) {
      const kaart = document.querySelector('.kaart.bewerkrij');
      const naam = kaart.querySelector('.b-naam').value.trim();
      const moeilijkheid = parseInt(kaart.querySelector('.b-moeilijkheid').value);
      if (!naam || isNaN(moeilijkheid)) return;
      const vakken = laad();
      vakken[i] = { ...vakken[i], naam, moeilijkheid };
      sla(vakken);
      render();
    }

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      const naam = document.getElementById('naam').value.trim();
      const moeilijkheid = parseInt(document.getElementById('moeilijkheid').value);
      const vakken = laad();
      vakken.push({ naam, moeilijkheid, toetsen: [], huiswerk: [] });
      sla(vakken);
      render();
      e.target.reset();
      document.getElementById('naam').focus();
    });

    document.getElementById('lijst').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const i = btn.dataset.i !== undefined ? parseInt(btn.dataset.i) : NaN;
      const j = btn.dataset.j !== undefined ? parseInt(btn.dataset.j) : NaN;

      if (btn.classList.contains('toets-delete')) {
        const vakken = laad(); vakken[i].toetsen.splice(j, 1); sla(vakken); render();
      } else if (btn.classList.contains('delete')) {
        const vakken = laad(); vakken.splice(i, 1); sla(vakken); render();
      } else if (btn.classList.contains('edit')) {
        startBewerken(i);
      } else if (btn.classList.contains('add-toets')) {
        toonToetsForm(i);
      } else if (btn.classList.contains('opslaan')) {
        slaBewerkingenOp(i);
      } else if (btn.classList.contains('annuleer')) {
        render();
      } else if (btn.classList.contains('toets-opslaan')) {
        slaToetsOp(i);
      } else if (btn.classList.contains('toets-annuleer')) {
        btn.closest('.toets-formrij').remove();
      } else if (btn.classList.contains('hw-vink')) {
        const vakken = laad();
        vakken[i].huiswerk[j].gedaan = !vakken[i].huiswerk[j].gedaan;
        sla(vakken); render();
      } else if (btn.classList.contains('hw-delete')) {
        const vakken = laad(); vakken[i].huiswerk.splice(j, 1); sla(vakken); render();
      } else if (btn.classList.contains('btn-add-hw')) {
        toonHuiswerkForm(i);
      } else if (btn.classList.contains('hw-opslaan')) {
        slaHuiswerkOp(i);
      } else if (btn.classList.contains('hw-annuleer')) {
        btn.closest('.hw-formrij').remove();
      }
    });

    render();

    document.addEventListener('focusin', e => {
      if (e.target.type !== 'date') return;
      const rect = e.target.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      if (spaceBelow < 340) window.scrollBy({ top: 340 - spaceBelow, behavior: 'smooth' });
    });
  </script>
</body>
</html>
