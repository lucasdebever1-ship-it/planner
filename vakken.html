<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <title>Vakken</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 20px;
    }

    /* Header */
    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }
    .nav-link { font-size: 0.85rem; color: #4f8ef7; text-decoration: none; }
    .nav-link:hover { text-decoration: underline; }

    /* Form panel */
    .form-panel {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .form-grid { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.7px; }

    input[type="text"],
    input[type="number"],
    input[type="date"] {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 8px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus { border-color: #4f8ef7; }
    input[type="text"]   { width: 180px; }
    input[type="number"] { width: 70px; }

    .btn-primary {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #3a7ef0; }

    /* Kaarten lijst */
    #lijst { display: flex; flex-direction: column; gap: 14px; }

    .kaart {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 14px;
      padding: 18px 20px;
      transition: border-color 0.15s;
    }
    .kaart:hover { border-color: #303030; }
    .kaart.bewerkrij { border-color: #4f8ef7; }

    .kaart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .kaart-titel { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .vak-naam { font-size: 1.1rem; font-weight: 700; }
    .moeilijkheid-badge {
      font-size: 0.68rem;
      font-weight: 700;
      color: #4f8ef7;
      background: #192840;
      border-radius: 20px;
      padding: 3px 9px;
      letter-spacing: 0.3px;
    }

    /* Actie-knoppen */
    .acties { display: flex; gap: 2px; flex-shrink: 0; }
    .acties button {
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 1rem;
      color: #444;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .acties .edit:hover      { color: #4f8ef7; background: #192840; }
    .acties .add-toets       { color: #4f8ef7; font-size: 1.25rem; font-weight: 400; }
    .acties .add-toets:hover { background: #192840; }
    .acties .delete:hover    { color: #e05252; background: #2d1818; }
    .acties .opslaan         { color: #3dcc7a; font-size: 1.1rem; }
    .acties .opslaan:hover   { background: #182d20; }
    .acties .annuleer        { color: #444; font-size: 1.1rem; }
    .acties .annuleer:hover  { color: #888; }

    /* Edit inputs in kaart */
    .kaart.bewerkrij .b-naam         { width: 150px; }
    .kaart.bewerkrij .b-moeilijkheid { width: 55px; }

    /* Toets chips */
    .toetsen-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .toets-chip-group { display: flex; flex-direction: column; gap: 4px; }

    .toets-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #192840;
      border: 1px solid #1e3558;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.82rem;
      color: #7fb3ff;
      white-space: nowrap;
    }
    .toets-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #2a4870;
      font-size: 0.68rem;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .toets-delete:hover { color: #e05252; }

    .leeradvies   { font-size: 0.72rem; color: #3dcc7a; padding-left: 10px; }
    .geen-toetsen { font-size: 0.82rem; color: #333; }

    /* Toets toevoegen form */
    .toets-formrij {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #1e1e1e;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .toets-formrij .t-naam { width: 155px; }
    .toets-formrij .btn-save {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toets-formrij .btn-save:hover { background: #3a7ef0; }
    .toets-formrij .btn-cancel {
      background: none;
      border: none;
      color: #444;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .toets-formrij .btn-cancel:hover { color: #888; }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Vakken</h1>
    <a href="overzicht.html" class="nav-link">Ga naar overzicht →</a>
  </div>

  <div class="form-panel">
    <form id="form">
      <div class="form-grid">
        <div class="form-group">
          <label for="naam">Naam vak</label>
          <input type="text" id="naam" placeholder="Bijv. Wiskunde" required>
        </div>
        <div class="form-group">
          <label for="moeilijkheid">Moeilijkheid</label>
          <input type="number" id="moeilijkheid" placeholder="1–10" min="1" max="10" required>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button type="submit" class="btn-primary">Toevoegen</button>
        </div>
      </div>
    </form>
  </div>

  <div id="lijst"></div>

  <script>
    const sleutel = 'vakken';

    function laad() {
      const vakken = JSON.parse(localStorage.getItem(sleutel) || '[]');
      return vakken.map(v => {
        if (!v.toetsen) {
          v.toetsen = v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : [];
          delete v.toetsdatum;
        }
        return v;
      });
    }

    function sla(vakken) {
      localStorage.setItem(sleutel, JSON.stringify(vakken));
    }

    function formatDatum(d) {
      return d ? new Date(d).toLocaleDateString('nl-NL') : '—';
    }

    function berekenBeginDatum(datum, moeilijkheid) {
      if (!datum) return null;
      const dagen = Math.round(moeilijkheid / 2 + 1);
      const d = new Date(datum);
      d.setDate(d.getDate() - dagen);
      return d.toLocaleDateString('nl-NL');
    }

    function renderToetsen(toetsen, moeilijkheid, i) {
      if (!toetsen.length) {
        return '<span class="geen-toetsen">Nog geen toetsen — gebruik + om er een toe te voegen</span>';
      }
      return '<div class="toetsen-grid">' + toetsen.map((t, j) => {
        const begin = berekenBeginDatum(t.datum, moeilijkheid);
        return `
          <div class="toets-chip-group">
            <div class="toets-chip">
              ${t.naam} · ${formatDatum(t.datum)}
              <button class="toets-delete" data-i="${i}" data-j="${j}" title="Verwijder toets">✕</button>
            </div>
            ${begin ? `<div class="leeradvies">📚 Begin op ${begin}</div>` : ''}
          </div>`;
      }).join('') + '</div>';
    }

    function render() {
      const vakken = laad();
      document.querySelectorAll('.toets-formrij').forEach(r => r.remove());
      document.getElementById('lijst').innerHTML = vakken.map((v, i) => `
        <div class="kaart" data-i="${i}">
          <div class="kaart-header">
            <div class="kaart-titel">
              <span class="vak-naam">${v.naam}</span>
              <span class="moeilijkheid-badge">${v.moeilijkheid} / 10</span>
            </div>
            <div class="acties">
              <button class="edit"      data-i="${i}" title="Vak bewerken">&#x270F;</button>
              <button class="add-toets" data-i="${i}" title="Toets toevoegen">+</button>
              <button class="delete"    data-i="${i}" title="Vak verwijderen">&#x2715;</button>
            </div>
          </div>
          ${renderToetsen(v.toetsen, v.moeilijkheid, i)}
        </div>
      `).join('');
    }

    function toonToetsForm(i) {
      document.querySelectorAll('.toets-formrij').forEach(r => r.remove());
      const kaart = document.querySelector(`.kaart[data-i="${i}"]`);
      const formDiv = document.createElement('div');
      formDiv.className = 'toets-formrij';
      formDiv.innerHTML = `
        <input type="text" class="t-naam" placeholder="Naam toets (bijv. proefwerk)">
        <input type="date" class="t-datum">
        <button class="toets-opslaan btn-save" data-i="${i}">&#x2713; Opslaan</button>
        <button class="toets-annuleer btn-cancel">&#x2715;</button>`;
      kaart.appendChild(formDiv);
      formDiv.querySelector('.t-naam').focus();
    }

    function slaToetsOp(i) {
      const formDiv = document.querySelector('.toets-formrij');
      const naam = formDiv.querySelector('.t-naam').value.trim();
      const datum = formDiv.querySelector('.t-datum').value || null;
      if (!naam) { formDiv.querySelector('.t-naam').focus(); return; }
      const vakken = laad();
      vakken[i].toetsen.push({ naam, datum });
      sla(vakken);
      render();
    }

    function startBewerken(i) {
      const vakken = laad();
      const v = vakken[i];
      document.querySelectorAll('.toets-formrij').forEach(r => r.remove());
      const kaart = document.querySelector(`.kaart[data-i="${i}"]`);
      kaart.classList.add('bewerkrij');
      kaart.innerHTML = `
        <div class="kaart-header">
          <div class="kaart-titel">
            <input type="text"   class="b-naam"         value="${v.naam}" required>
            <input type="number" class="b-moeilijkheid" value="${v.moeilijkheid}" min="1" max="10" required>
          </div>
          <div class="acties">
            <button class="opslaan"  data-i="${i}" title="Opslaan">&#x2713;</button>
            <button class="annuleer" data-i="${i}" title="Annuleren">&#x2715;</button>
          </div>
        </div>
        ${renderToetsen(v.toetsen, v.moeilijkheid, i)}`;
      kaart.querySelector('.b-naam').focus();
    }

    function slaBewerkingenOp(i) {
      const kaart = document.querySelector('.kaart.bewerkrij');
      const naam = kaart.querySelector('.b-naam').value.trim();
      const moeilijkheid = parseInt(kaart.querySelector('.b-moeilijkheid').value);
      if (!naam || isNaN(moeilijkheid)) return;
      const vakken = laad();
      vakken[i] = { ...vakken[i], naam, moeilijkheid };
      sla(vakken);
      render();
    }

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      const naam = document.getElementById('naam').value.trim();
      const moeilijkheid = parseInt(document.getElementById('moeilijkheid').value);
      const vakken = laad();
      vakken.push({ naam, moeilijkheid, toetsen: [] });
      sla(vakken);
      render();
      e.target.reset();
      document.getElementById('naam').focus();
    });

    document.getElementById('lijst').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const i = btn.dataset.i !== undefined ? parseInt(btn.dataset.i) : NaN;
      const j = btn.dataset.j !== undefined ? parseInt(btn.dataset.j) : NaN;

      if (btn.classList.contains('toets-delete')) {
        const vakken = laad();
        vakken[i].toetsen.splice(j, 1);
        sla(vakken);
        render();
      } else if (btn.classList.contains('delete')) {
        const vakken = laad();
        vakken.splice(i, 1);
        sla(vakken);
        render();
      } else if (btn.classList.contains('edit')) {
        startBewerken(i);
      } else if (btn.classList.contains('add-toets')) {
        toonToetsForm(i);
      } else if (btn.classList.contains('opslaan')) {
        slaBewerkingenOp(i);
      } else if (btn.classList.contains('annuleer')) {
        render();
      } else if (btn.classList.contains('toets-opslaan')) {
        slaToetsOp(i);
      } else if (btn.classList.contains('toets-annuleer')) {
        btn.closest('.toets-formrij').remove();
      }
    });

    render();
  </script>
</body>
</html>
