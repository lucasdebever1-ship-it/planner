<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Vakken – Struct</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 90px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; color: #1a1a1a; }

    .form-panel {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .form-rij { display: flex; gap: 10px; margin-bottom: 10px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.7px; font-weight: 600; }
    .form-group.flex1 { flex: 1; }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select {
      width: 100%;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      color: #1a1a1a;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    select:focus { border-color: #3ddc97; }
    select { appearance: none; }
    input[type="number"] { width: 80px; }

    .btn-primary {
      width: 100%;
      background: #3ddc97;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #2bc47e; }

    #lijst { display: flex; flex-direction: column; gap: 16px; }

    .kaart {
      background: #f5f5f5;
      border: 1px solid #ebebeb;
      border-radius: 16px;
      padding: 18px;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .kaart:hover { border-color: #ddd; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .kaart.bewerkrij { border-color: #3ddc97; box-shadow: 0 0 0 3px rgba(61,220,151,0.12); }

    .kaart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
    }
    .kaart-titel { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
    .vak-naam {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.2px; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .moeilijkheid-badge {
      font-size: 0.68rem; font-weight: 700;
      color: #2bc47e; background: #edf8f3;
      border-radius: 20px; padding: 3px 9px; flex-shrink: 0;
    }

    .acties { display: flex; gap: 2px; flex-shrink: 0; }
    .acties button {
      background: none; border: none; cursor: pointer;
      border-radius: 7px; padding: 7px 9px;
      font-size: 1rem; color: #bbb;
      transition: color 0.15s, background 0.15s; line-height: 1;
    }
    .acties .edit:hover      { color: #4a7ef0; background: #eef3ff; }
    .acties .add-toets       { color: #3ddc97; font-size: 1.3rem; font-weight: 400; }
    .acties .add-toets:hover { background: #edf8f3; }
    .acties .delete:hover    { color: #e05252; background: #fff5f5; }
    .acties .opslaan         { color: #3ddc97; font-size: 1.1rem; }
    .acties .opslaan:hover   { background: #edf8f3; }
    .acties .annuleer        { color: #bbb; font-size: 1.1rem; }
    .acties .annuleer:hover  { color: #888; background: #f5f5f5; }

    .kaart.bewerkrij .b-naam         { flex: 1; }
    .kaart.bewerkrij .b-moeilijkheid { width: 65px; }

    .toetsen-grid { display: flex; flex-direction: column; gap: 10px; }

    .toets-chip {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; background: #eef3ff; border: 1px solid #c8d8ff;
      border-radius: 10px; padding: 8px 12px;
      font-size: 0.88rem; color: #3a6edc;
    }
    .toets-chip-naam { flex: 1; }
    .toets-delete {
      background: none; border: none; cursor: pointer;
      color: #c8d8ff; font-size: 0.75rem; padding: 0;
      line-height: 1; transition: color 0.15s; flex-shrink: 0;
    }
    .toets-delete:hover { color: #e05252; }

    .leeradvies   { font-size: 0.78rem; color: #2bc47e; margin-top: 3px; padding-left: 2px; }
    .geen-toetsen { font-size: 0.85rem; color: #bbb; }

    .toets-type-label {
      font-size: 0.68rem; font-weight: 700; color: #6b6b6b;
      background: #f0f0f0; border-radius: 20px; padding: 2px 8px; flex-shrink: 0;
    }

    .toets-formrij {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid #ebebeb;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toets-formrij-knoppen { display: flex; gap: 8px; }
    .toets-formrij .btn-save {
      flex: 1; background: #3ddc97; color: #ffffff; border: none;
      border-radius: 8px; padding: 9px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .toets-formrij .btn-save:hover { background: #2bc47e; }
    .toets-formrij .btn-cancel {
      background: #f5f5f5; border: 1px solid #e0e0e0; color: #888;
      font-size: 0.9rem; cursor: pointer; padding: 9px 14px;
      border-radius: 8px; transition: color 0.15s;
    }
    .toets-formrij .btn-cancel:hover { color: #444; }

    /* ── Huiswerk ── */
    .huiswerk-sectie {
      margin-top: 16px; padding-top: 14px; border-top: 1px solid #ebebeb;
    }
    .sectie-label {
      font-size: 0.68rem; font-weight: 700; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px;
    }
    .geen-hw { font-size: 0.82rem; color: #bbb; margin-bottom: 8px; display: block; }
    .huiswerk-lijst { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
    .huiswerk-item {
      display: flex; align-items: center; gap: 10px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 8px; padding: 8px 10px; transition: opacity 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .huiswerk-item.gedaan { opacity: 0.45; }
    .huiswerk-item.gedaan .hw-omschrijving { text-decoration: line-through; color: #bbb; }

    .hw-vink {
      flex-shrink: 0; width: 26px; height: 26px;
      border-radius: 50%; border: 2px solid #e0e0e0;
      background: none; color: transparent;
      font-size: 0.8rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1; padding: 0;
    }
    .hw-vink:hover   { border-color: #3ddc97; color: #3ddc97; }
    .hw-vink.gevinkd { border-color: #3ddc97; background: #edf8f3; color: #3ddc97; }

    .hw-info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .hw-omschrijving {
      font-size: 0.88rem; font-weight: 600; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hw-datum { font-size: 0.73rem; color: #aaa; }

    .hw-delete {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: #ddd; font-size: 0.73rem; padding: 4px 6px;
      line-height: 1; transition: color 0.15s;
    }
    .hw-delete:hover { color: #e05252; }

    .btn-add-hw {
      width: 100%; background: none; border: 1px dashed #d0d0d0;
      border-radius: 8px; color: #bbb; font-size: 0.82rem;
      padding: 7px 12px; cursor: pointer; text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-hw:hover { border-color: #3ddc97; color: #2bc47e; }

    .hw-formrij { margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
    .hw-weekdag-info { font-size: 0.78rem; color: #2bc47e; padding-left: 2px; }
    .hw-formrij-knoppen { display: flex; gap: 8px; }
    .hw-formrij .btn-save {
      flex: 1; background: #3ddc97; color: #ffffff; border: none;
      border-radius: 8px; padding: 9px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .hw-formrij .btn-save:hover { background: #2bc47e; }
    .hw-formrij .btn-cancel {
      background: #f5f5f5; border: 1px solid #e0e0e0; color: #888;
      font-size: 0.9rem; cursor: pointer; padding: 9px 14px;
      border-radius: 8px; transition: color 0.15s;
    }
    .hw-formrij .btn-cancel:hover { color: #444; }

    /* ── Navigatie ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn:hover { background: #f0f0f0; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #888; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #1a1a1a; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.rood { color: #e05252; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 1px solid #ebebeb;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #bbb;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #3ddc97; }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Vakken</h1>
    <button class="hamburger-btn" id="hamburger" aria-label="Menu">
      <span class="hamburger-streep"></span>
      <span class="hamburger-streep"></span>
      <span class="hamburger-streep"></span>
    </button>
  </div>

  <div class="form-panel">
    <form id="form">
      <div class="form-rij">
        <div class="form-group flex1">
          <label for="naam">Naam vak</label>
          <input type="text" id="naam" placeholder="Bijv. Wiskunde" required>
        </div>
        <div class="form-group">
          <label for="moeilijkheid">Moeilijkheid</label>
          <input type="number" id="moeilijkheid" placeholder="1–10" min="1" max="10" required>
        </div>
      </div>
      <button type="submit" class="btn-primary">Vak toevoegen</button>
    </form>
  </div>

  <div id="lijst"></div>

  <!-- Menu -->
  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-achtergrond" onclick="sluitMenu()"></div>
    <div class="menu-kaart">
      <a href="instellingen.html" class="menu-item" onclick="sluitMenu()">⚙️&nbsp; Instellingen</a>
      <button class="menu-item rood" onclick="resetProfiel()">🔄&nbsp; Profiel resetten</button>
    </div>
  </div>

  <!-- Tabbar -->
  <nav class="tabbar">

      </span>Vakken</a>
    <a href="week.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="17" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="7" y1="14" x2="10.5" y2="14"/><line x1="13.5" y1="14" x2="17" y2="14"/><line x1="7" y1="18" x2="10.5" y2="18"/></svg>

  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }

    const sleutel = 'vakken';
    const dagNamen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];

    function eerstvolgendeWeekdag(dagNr) {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      const diff = (dagNr - d.getDay() + 7) % 7;
      d.setDate(d.getDate() + diff);
      const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function laad() {
      const vakken = JSON.parse(localStorage.getItem(sleutel) || '[]');
      const vandaag = new Date();
      vandaag.setHours(0, 0, 0, 0);
      let veranderd = false;
      const result = vakken.map(v => {
        if (!v.toetsen) {
          v.toetsen = v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : [];
          delete v.toetsdatum;
        }
        if (!v.huiswerk) v.huiswerk = [];
        v.huiswerk = v.huiswerk.filter(h => {
          if (!h.inleverdatum) return true;
          const datum = new Date(h.inleverdatum);
          datum.setHours(0, 0, 0, 0);
          if (h.gedaan && datum < vandaag) {
            if (h.weekdag != null) {
              h.gedaan = false;
              h.inleverdatum = eerstvolgendeWeekdag(h.weekdag);
              veranderd = true;
              return true;
            }
            veranderd = true;
            return false;
          }
          return true;
        });
        return v;
      });
      if (veranderd) localStorage.setItem(sleutel, JSON.stringify(result));
      return result;
    }

    function sla(vakken) { localStorage.setItem(sleutel, JSON.stringify(vakken)); }

    function formatDatum(d) {
      return d ? new Date(d + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' }) : '—';
    }

    const STANDAARD_DAGEN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0, Schrijfvaardigheid:2, PO:14, Anders:3 };

    function getLeerDagen(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key = type || 'Anders';
      const basis = inst[key] !== undefined ? inst[key] : (STANDAARD_DAGEN[key] !== undefined ? STANDAARD_DAGEN[key] : STANDAARD_DAGEN.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function berekenBeginDatum(datum, type, moeilijkheid) {
      if (!datum) return null;
      const dagen = getLeerDagen(type, moeilijkheid);
      if (dagen === 0) return null;
      const d = new Date(datum);
      d.setDate(d.getDate() - dagen);
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
    }

    function renderToetsen(toetsen, moeilijkheid, i) {
      if (!toetsen.length) return '<span class="geen-toetsen">Nog geen toetsen — gebruik + om er een toe te voegen</span>';
      return '<div class="toetsen-grid">' + toetsen.map((t, j) => {
        const begin = berekenBeginDatum(t.datum, t.type, moeilijkheid);
        return `<div class="toets-chip-group">
          <div class="toets-chip">
            <span class="toets-chip-naam">${t.naam} · ${formatDatum(t.datum)}</span>
            ${t.type ? `<span class="toets-type-label">${t.type}</span>` : ''}
            <button class="toets-delete" data-i="${i}" data-j="${j}" title="Verwijder toets">✕</button>
          </div>
          ${begin ? `<div class="leeradvies">📚 Begin op ${begin}</div>` : ''}
        </div>`;
      }).join('') + '</div>';
    }

    function renderHuiswerk(huiswerk, i) {
      let html = '<div class="huiswerk-sectie"><div class="sectie-label">Huiswerk</div>';
      if (huiswerk.length) {
        html += '<div class="huiswerk-lijst">';
        huiswerk.forEach((h, j) => {
          const datumTekst = h.inleverdatum ? formatDatum(h.inleverdatum) : '—';
          const herhalTekst = h.weekdag != null ? ` · elke ${dagNamen[h.weekdag].toLowerCase()}` : '';
          html += `<div class="huiswerk-item${h.gedaan ? ' gedaan' : ''}">
            <button class="hw-vink${h.gedaan ? ' gevinkd' : ''}" data-i="${i}" data-j="${j}">✓</button>
            <div class="hw-info">
              <span class="hw-omschrijving">${h.omschrijving}</span>
              <span class="hw-datum">📅 ${datumTekst}${herhalTekst}</span>
            </div>
            <button class="hw-delete" data-i="${i}" data-j="${j}" title="Verwijder">✕</button>
          </div>`;
        });
        html += '</div>';
      } else {
        html += '<span class="geen-hw">Nog geen huiswerk</span>';
      }
      html += `<button class="btn-add-hw" data-i="${i}">📋 Huiswerk toevoegen</button></div>`;
      return html;
    }

    function sluitForms() { document.querySelectorAll('.toets-formrij, .hw-formrij').forEach(r => r.remove()); }

    function render() {
      const vakken = laad();
      sluitForms();
      document.getElementById('lijst').innerHTML = vakken.map((v, i) => `
        <div class="kaart" data-i="${i}">
          <div class="kaart-header">
            <div class="kaart-titel">
              <span class="vak-naam">${v.naam}</span>
              <span class="moeilijkheid-badge">${v.moeilijkheid} / 10</span>
            </div>
            <div class="acties">
              <button class="edit"      data-i="${i}" title="Bewerken">&#x270F;</button>
              <button class="add-toets" data-i="${i}" title="Toets toevoegen">+</button>
              <button class="delete"    data-i="${i}" title="Verwijderen">&#x2715;</button>
            </div>
          </div>
          ${renderToetsen(v.toetsen, v.moeilijkheid, i)}
          ${renderHuiswerk(v.huiswerk, i)}
        </div>
      `).join('');
    }

    function toonToetsForm(i) {
      sluitForms();
      const kaart = document.querySelector(`.kaart[data-i="${i}"]`);
      const formDiv = document.createElement('div');
      formDiv.className = 'toets-formrij';
      formDiv.innerHTML = `
        <input type="text" class="t-naam" placeholder="Naam toets (bijv. hoofdstuk 3)">
        <select class="t-type">
          <option value="Proefwerk">Proefwerk</option>
          <option value="SO">SO</option>
          <option value="Mondeling">Mondeling</option>
          <option value="Luistertoets">Luistertoets</option>
          <option value="Schrijfvaardigheid">Schrijfvaardigheid</option>
          <option value="PO">PO</option>
          <option value="Anders">Anders</option>
        </select>
        <input type="date" class="t-datum">
        <div class="toets-formrij-knoppen">
          <button class="toets-opslaan btn-save" data-i="${i}">&#x2713; Opslaan</button>
          <button class="toets-annuleer btn-cancel">&#x2715;</button>
        </div>`;
      kaart.appendChild(formDiv);
      formDiv.querySelector('.t-naam').focus();
    }

    function slaToetsOp(i) {
      const formDiv = document.querySelector('.toets-formrij');
      const naam  = formDiv.querySelector('.t-naam').value.trim();
      const type  = formDiv.querySelector('.t-type').value;
      const datum = formDiv.querySelector('.t-datum').value || null;
      if (!naam) { formDiv.querySelector('.t-naam').focus(); return; }
      const vakken = laad();
      vakken[i].toetsen.push({ naam, type, datum });
      sla(vakken); render();
    }

    function toonHuiswerkForm(i) {
      sluitForms();
      const kaart  = document.querySelector(`.kaart[data-i="${i}"]`);
      const sectie = kaart.querySelector('.huiswerk-sectie');
      const addBtn = sectie.querySelector('.btn-add-hw');
      const formDiv = document.createElement('div');
      formDiv.className = 'hw-formrij';
      formDiv.innerHTML = `
        <input type="text" class="hw-oms" placeholder="Omschrijving huiswerk">
        <select class="hw-wdag">
          <option value="">Eenmalig (kies datum)</option>
          <option value="1">Altijd maandag</option>
          <option value="2">Altijd dinsdag</option>
          <option value="3">Altijd woensdag</option>
          <option value="4">Altijd donderdag</option>
          <option value="5">Altijd vrijdag</option>
          <option value="6">Altijd zaterdag</option>
          <option value="0">Altijd zondag</option>
        </select>
        <input type="date" class="hw-datum-input">
        <div class="hw-weekdag-info" style="display:none"></div>
        <div class="hw-formrij-knoppen">
          <button class="hw-opslaan btn-save" data-i="${i}">✓ Opslaan</button>
          <button class="hw-annuleer btn-cancel">✕</button>
        </div>`;
      sectie.insertBefore(formDiv, addBtn);
      const select = formDiv.querySelector('.hw-wdag');
      const datumInput = formDiv.querySelector('.hw-datum-input');
      const info = formDiv.querySelector('.hw-weekdag-info');
      select.addEventListener('change', () => {
        if (select.value === '') {
          datumInput.style.display = ''; info.style.display = 'none';
        } else {
          datumInput.style.display = 'none';
          const datum = eerstvolgendeWeekdag(parseInt(select.value));
          info.textContent = '📅 Eerst op: ' + new Date(datum + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
          info.style.display = '';
        }
      });
      formDiv.querySelector('.hw-oms').focus();
    }

    function slaHuiswerkOp(i) {
      const formDiv = document.querySelector('.hw-formrij');
      const omschrijving = formDiv.querySelector('.hw-oms').value.trim();
      const weekdagVal   = formDiv.querySelector('.hw-wdag').value;
      const datumVal     = formDiv.querySelector('.hw-datum-input').value;
      if (!omschrijving) { formDiv.querySelector('.hw-oms').focus(); return; }
      let weekdag = null, inleverdatum = null;
      if (weekdagVal !== '') {
        weekdag = parseInt(weekdagVal);
        inleverdatum = eerstvolgendeWeekdag(weekdag);
      } else {
        inleverdatum = datumVal || null;
      }
      const vakken = laad();
      vakken[i].huiswerk.push({ id: Date.now(), omschrijving, inleverdatum, weekdag, gedaan: false });
      sla(vakken); render();
    }

    function startBewerken(i) {
      const vakken = laad();
      const v = vakken[i];
      sluitForms();
      const kaart = document.querySelector(`.kaart[data-i="${i}"]`);
      kaart.classList.add('bewerkrij');
      kaart.innerHTML = `
        <div class="kaart-header">
          <div class="kaart-titel" style="flex:1;gap:8px">
            <input type="text"   class="b-naam"         value="${v.naam}" required>
            <input type="number" class="b-moeilijkheid" value="${v.moeilijkheid}" min="1" max="10" required>
          </div>
          <div class="acties">
            <button class="opslaan"  data-i="${i}">&#x2713;</button>
            <button class="annuleer" data-i="${i}">&#x2715;</button>
          </div>
        </div>
        ${renderToetsen(v.toetsen, v.moeilijkheid, i)}
        ${renderHuiswerk(v.huiswerk, i)}`;
      kaart.querySelector('.b-naam').focus();
    }

    function slaBewerkingenOp(i) {
      const kaart = document.querySelector('.kaart.bewerkrij');
      const naam = kaart.querySelector('.b-naam').value.trim();
      const moeilijkheid = parseInt(kaart.querySelector('.b-moeilijkheid').value);
      if (!naam || isNaN(moeilijkheid)) return;
      const vakken = laad();
      vakken[i] = { ...vakken[i], naam, moeilijkheid };
      sla(vakken); render();
    }

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      const naam = document.getElementById('naam').value.trim();
      const moeilijkheid = parseInt(document.getElementById('moeilijkheid').value);
      const vakken = laad();
      vakken.push({ naam, moeilijkheid, toetsen: [], huiswerk: [] });
      sla(vakken); render();
      e.target.reset();
      document.getElementById('naam').focus();
    });

    document.getElementById('lijst').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const i = btn.dataset.i !== undefined ? parseInt(btn.dataset.i) : NaN;
      const j = btn.dataset.j !== undefined ? parseInt(btn.dataset.j) : NaN;
      if (btn.classList.contains('toets-delete')) {
        const vakken = laad(); vakken[i].toetsen.splice(j, 1); sla(vakken); render();
      } else if (btn.classList.contains('delete')) {
        const vakken = laad(); vakken.splice(i, 1); sla(vakken); render();
      } else if (btn.classList.contains('edit'))         { startBewerken(i); }
      else if (btn.classList.contains('add-toets'))      { toonToetsForm(i); }
      else if (btn.classList.contains('opslaan'))        { slaBewerkingenOp(i); }
      else if (btn.classList.contains('annuleer'))       { render(); }
      else if (btn.classList.contains('toets-opslaan'))  { slaToetsOp(i); }
      else if (btn.classList.contains('toets-annuleer')) { btn.closest('.toets-formrij').remove(); }
      else if (btn.classList.contains('hw-vink')) {
        const vakken = laad();
        vakken[i].huiswerk[j].gedaan = !vakken[i].huiswerk[j].gedaan;
        sla(vakken); render();
      } else if (btn.classList.contains('hw-delete')) {
        const vakken = laad(); vakken[i].huiswerk.splice(j, 1); sla(vakken); render();
      } else if (btn.classList.contains('btn-add-hw'))   { toonHuiswerkForm(i); }
      else if (btn.classList.contains('hw-opslaan'))     { slaHuiswerkOp(i); }
      else if (btn.classList.contains('hw-annuleer'))    { btn.closest('.hw-formrij').remove(); }
    });

    render();

    document.addEventListener('focusin', e => {
      if (e.target.type !== 'date') return;
      const rect = e.target.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      if (spaceBelow < 340) window.scrollBy({ top: 340 - spaceBelow, behavior: 'smooth' });
    });
  </script>
</body>
</html>
