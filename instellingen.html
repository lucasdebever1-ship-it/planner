<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Instellingen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 90px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }

    /* ── Navigatie ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn:hover { background: #1a1a1a; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #666; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #1c1c1c; border: 1px solid #2e2e2e;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #e8e8e8; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #242424;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #242424; }
    .menu-item.rood { color: #e05252; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0f0f0f; border-top: 1px solid #1e1e1e;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #3a3a3a;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #4f8ef7; }
    .tab-icoon { font-size: 1.35rem; line-height: 1; }

    .sectie-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #555;
      margin: 0 0 14px;
    }

    .kaart {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 4px 0;
      margin-bottom: 24px;
    }

    .instelling-rij {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #1e1e1e;
      gap: 16px;
    }
    .instelling-rij:last-child { border-bottom: none; }

    .instelling-naam {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .instelling-rij-rechts {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    input[type="number"] {
      width: 64px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e8e8e8;
      padding: 8px 10px;
      font-size: 0.95rem;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: #4f8ef7; }

    .dagen-label {
      font-size: 0.85rem;
      color: #555;
      min-width: 30px;
    }

    .acties {
      display: flex;
      gap: 10px;
    }

    .btn-opslaan {
      flex: 1;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-opslaan:active { transform: scale(0.98); }
    .btn-opslaan:hover { background: #3a7ef0; }

    .btn-reset {
      background: #161616;
      color: #666;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-reset:hover { color: #e8e8e8; border-color: #444; }

    .feedback {
      font-size: 0.85rem;
      color: #3dcc7a;
      text-align: center;
      margin-top: 14px;
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .feedback.zichtbaar { opacity: 1; }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Instellingen</h1>
    <button class="hamburger-btn" id="hamburger" aria-label="Menu">
      <span class="hamburger-streep"></span>
      <span class="hamburger-streep"></span>
      <span class="hamburger-streep"></span>
    </button>
  </div>

  <p class="sectie-label">Dagen van tevoren beginnen</p>

  <div class="kaart" id="instellingen-kaart"></div>

  <div class="acties">
    <button class="btn-opslaan" onclick="opslaan()">Opslaan</button>
    <button class="btn-reset"   onclick="herstelStandaard()">Standaard</button>
  </div>
  <div class="feedback" id="feedback">Instellingen opgeslagen ✓</div>

  <!-- Menu -->
  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-achtergrond" onclick="sluitMenu()"></div>
    <div class="menu-kaart">
      <button class="menu-item rood" onclick="resetProfiel()">🔄&nbsp; Profiel resetten</button>
    </div>
  </div>

  <!-- Tabbar -->
  <nav class="tabbar">
    <a href="index.html"     class="tab"><span class="tab-icoon">🏠</span>Home</a>
    <a href="vakken.html"    class="tab"><span class="tab-icoon">📚</span>Vakken</a>
    <a href="week.html"      class="tab"><span class="tab-icoon">📅</span>Week</a>
    <a href="overzicht.html" class="tab"><span class="tab-icoon">📝</span>Toetsen</a>
  </nav>

  <script>
    // Navigatie
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }
    const STANDAARD = {
      Mondeling:       7,
      Proefwerk:       4,
      SO:              1,
      Luistertoets:    0,
      Schrijfvaardigheid: 2,
      PO:             14,
      Anders:          3,
    };

    function laadInstellingen() {
      const opgeslagen = JSON.parse(localStorage.getItem('instellingen') || '{}');
      return Object.fromEntries(
        Object.keys(STANDAARD).map(k => [k, opgeslagen[k] !== undefined ? opgeslagen[k] : STANDAARD[k]])
      );
    }

    function renderKaart(waarden) {
      const kaart = document.getElementById('instellingen-kaart');
      kaart.innerHTML = Object.entries(waarden).map(([type, dagen]) => `
        <div class="instelling-rij">
          <span class="instelling-naam">${type}</span>
          <div class="instelling-rij-rechts">
            <input type="number" id="inst-${type}" value="${dagen}" min="0" max="60">
            <span class="dagen-label">dagen</span>
          </div>
        </div>
      `).join('');
    }

    function opslaan() {
      const waarden = {};
      Object.keys(STANDAARD).forEach(type => {
        const input = document.getElementById('inst-' + type);
        const val = parseInt(input.value);
        waarden[type] = isNaN(val) || val < 0 ? STANDAARD[type] : val;
        input.value = waarden[type];
      });
      localStorage.setItem('instellingen', JSON.stringify(waarden));
      const fb = document.getElementById('feedback');
      fb.classList.add('zichtbaar');
      setTimeout(() => fb.classList.remove('zichtbaar'), 2000);
    }

    function herstelStandaard() {
      localStorage.removeItem('instellingen');
      renderKaart(STANDAARD);
    }

    renderKaart(laadInstellingen());
  </script>
</body>
</html>
