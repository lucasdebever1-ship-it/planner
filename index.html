<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Struct</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3ddc97">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Struct">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Splashscreen ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    .splash-naam {
      font-family: 'Inter', sans-serif;
      font-size: 2.8rem;
      font-weight: 500;
      color: #3ddc97;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      user-select: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      margin: 0;
      min-height: 100vh;
      padding: 0 0 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.splash-actief > :not(#splash) { visibility: hidden; }

    .center {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      padding: 16px 0 8px;
    }

    .tagline {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0 0 6px;
      line-height: 1.2;
      color: #1a1a1a;
    }

    .sub {
      font-size: 0.95rem;
      color: #6b6b6b;
      margin: 0 0 32px;
    }

    .sectie-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #aaa;
      margin: 0 0 12px;
    }

    #vandaag-lijst {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .vandaag-kaart {
      background: #f5f5f5;
      border: 1px solid #ebebeb;
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .vandaag-kaart.te-laat {
      background: #fff5f5;
      border-color: #ffd0d0;
    }

    .vandaag-vak    { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.2px; margin-bottom: 2px; color: #1a1a1a; }
    .vandaag-toets  { font-size: 0.88rem; color: #6b6b6b; margin-bottom: 10px; }
    .vandaag-datum  { font-size: 0.95rem; color: #888; margin-bottom: 8px; }
    .vandaag-status-begin { font-size: 0.95rem; font-weight: 600; color: #2bc47e; }
    .vandaag-status-laat  { font-size: 0.95rem; font-weight: 600; color: #e05252; }

    .vandaag-leeg {
      font-size: 0.95rem;
      color: #aaa;
      padding: 16px 18px;
      background: #f5f5f5;
      border-radius: 14px;
      border: 1px solid #ebebeb;
    }

    /* ── Navigatie ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn:hover { background: #f0f0f0; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #888; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #1a1a1a; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.rood { color: #e05252; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 1px solid #ebebeb;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #bbb;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #3ddc97; }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>
<body>
  <div id="splash"><span class="splash-naam">Struct</span></div>

  <div class="center">
    <div class="top-bar">
      <button class="hamburger-btn" id="hamburger" aria-label="Menu">
        <span class="hamburger-streep"></span>
        <span class="hamburger-streep"></span>
        <span class="hamburger-streep"></span>
      </button>
    </div>

    <h1 class="tagline" id="begroeting"></h1>
    <p class="sub">Weet wat je moet leren. En wanneer.</p>

    <p class="sectie-label">Vandaag</p>
    <div id="vandaag-lijst"></div>
  </div>

  <!-- Menu -->
  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-achtergrond" onclick="sluitMenu()"></div>
    <div class="menu-kaart">
      <a href="instellingen.html" class="menu-item" onclick="sluitMenu()">⚙️&nbsp; Instellingen</a>
      <button class="menu-item rood" onclick="resetProfiel()">🔄&nbsp; Profiel resetten</button>
    </div>
  </div>

  <!-- Tabbar -->
  <nav class="tabbar">
    <a href="index.html" class="tab actief">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11L12 3L21 11V21H15V16H9V21H3V11Z"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><path d="M3 11L12 3L21 11V21H15V16H9V21H3V11Z" fill="#3ddc97"/></svg>
      </span>Home</a>
    <a href="vakken.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7V20"/><path d="M12 7C10.5 5.8 8 5.5 5 6.5V20C8 19 10.5 19.5 12 20"/><path d="M12 7C13.5 5.8 16 5.5 19 6.5V20C16 19 13.5 19.5 12 20"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><path d="M11 7.5C9.5 6.3 7 5.8 4.5 6.8V20C7 19 9.5 19.5 11 20.5V7.5Z" fill="#3ddc97"/><path d="M13 7.5C14.5 6.3 17 5.8 19.5 6.8V20C17 19 14.5 19.5 13 20.5V7.5Z" fill="#3ddc97"/></svg>
      </span>Vakken</a>
    <a href="week.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="17" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="7" y1="14" x2="10.5" y2="14"/><line x1="13.5" y1="14" x2="17" y2="14"/><line x1="7" y1="18" x2="10.5" y2="18"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="17" rx="2" fill="#3ddc97"/><rect x="7" y="3" width="2" height="4" rx="1" fill="#3ddc97"/><rect x="15" y="3" width="2" height="4" rx="1" fill="#3ddc97"/><line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/><line x1="7" y1="14" x2="10.5" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/><line x1="13.5" y1="14" x2="17" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/><line x1="7" y1="18" x2="10.5" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/></svg>
      </span>Week</a>
    <a href="overzicht.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="3" rx="1"/><path d="M8.5 13L11 15.5L15.5 10"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2" fill="#3ddc97"/><rect x="9" y="2" width="6" height="3" rx="1" fill="#2bc47e"/><path d="M8.5 13L11 15.5L15.5 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </span>Toetsen</a>
    <a href="afspraken.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 15.5"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#3ddc97"/><polyline points="12 7 12 12 15.5 15.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </span>Afspraken</a>
  </nav>

  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }

    // Splashscreen: alleen bij allereerste keer dat de app wordt geopend
    const splashGetoond = localStorage.getItem('struct_splash_shown');
    const heeftProfiel = !!localStorage.getItem('profiel');

    function naSplash() {
      if (!heeftProfiel) location.replace('onboarding.html');
    }

    if (!splashGetoond) {
      localStorage.setItem('struct_splash_shown', '1');
      document.body.classList.add('splash-actief');
      const splash = document.getElementById('splash');
      splash.style.transition = 'opacity 0.8s ease';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        splash.style.opacity = '1';
      }));
      setTimeout(() => {
        splash.style.transition = 'opacity 0.5s ease';
        splash.style.opacity = '0';
        splash.addEventListener('transitionend', () => {
          splash.remove();
          document.body.classList.remove('splash-actief');
          naSplash();
        }, { once: true });
      }, 1800);
    } else {
      document.getElementById('splash').remove();
      naSplash();
    }

    const profiel = JSON.parse(localStorage.getItem('profiel') || '{}');
    document.getElementById('begroeting').textContent =
      (profiel.naam ? 'Hé ' + profiel.naam + ',' : 'Hé,') + ' klaar voor vandaag?';

    (function() {
      function leerMultiplier() {
        return ['VWO 5','VWO 6','HAVO 4','HAVO 5'].includes(profiel.niveau) ? 1.5 : 1;
      }
      const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');
      const vandaag = new Date();
      vandaag.setHours(0, 0, 0, 0);
      const items = [];
      vakken.forEach(v => {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : []);
        toetsen.forEach(t => {
          if (!t.datum) return;
          const toetsDatum = new Date(t.datum);
          toetsDatum.setHours(0, 0, 0, 0);
          const dagsTotToets = Math.round((toetsDatum - vandaag) / 86400000);
          if (dagsTotToets < 0) return;
          const startDagen = Math.round((v.moeilijkheid / 2 + 1) * leerMultiplier());
          const dagsTotBegin = dagsTotToets - startDagen;
          if (dagsTotBegin > 0) return;
          items.push({ vak: v.naam, toets: t, dagsTotBegin, toetsDatum });
        });
      });
      const lijst = document.getElementById('vandaag-lijst');
      if (!items.length) {
        lijst.innerHTML = '<div class="vandaag-leeg">Geen toetsen voor vandaag — geniet ervan 🎉</div>';
        return;
      }
      items.sort((a, b) => a.toetsDatum - b.toetsDatum);
      lijst.innerHTML = items.map(r => {
        const teLaat = r.dagsTotBegin < 0;
        const datumStr = r.toetsDatum.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
        const status = teLaat
          ? '<div class="vandaag-status-laat">⚠️ Je bent te laat met beginnen!</div>'
          : '<div class="vandaag-status-begin">📚 Begin vandaag</div>';
        return `<div class="vandaag-kaart${teLaat ? ' te-laat' : ''}">
          <div class="vandaag-vak">${r.vak}</div>
          <div class="vandaag-toets">${r.toets.naam}</div>
          <div class="vandaag-datum">Toets op ${datumStr}</div>
          ${status}
        </div>`;
      }).join('');
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
