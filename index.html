<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="color-scheme" content="light">
  <title>Struct</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3ddc97">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Struct">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Splashscreen ── */
    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      will-change: opacity, transform;
    }
    .splash-naam {
      font-family: 'Inter', sans-serif;
      font-size: 2.8rem; font-weight: 500;
      color: #3ddc97; letter-spacing: 0.3em;
      text-transform: uppercase; user-select: none;
      will-change: letter-spacing;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff; color: #1a1a1a;
      margin: 0; min-height: 100vh;
      padding: 0 0 90px;
      display: flex; flex-direction: column; align-items: center;
    }
    body.splash-actief > :not(#splash) { visibility: hidden; }

    .center { width: 100%; max-width: 480px; padding: 0 20px; }

    /* ── Header ── */
    .header-rij {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 24px 0 0;
    }
    .begroeting {
      font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px;
      margin: 0 0 3px; line-height: 1.2; color: #1a1a1a;
    }
    .datum-lijn { font-size: 0.88rem; color: #bbb; margin: 0 0 28px; font-weight: 500; }

    /* ── Sectie labels ── */
    .sectie-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.9px;
      color: #aaa; margin: 0 0 12px;
    }
    .sectie-label-mt { margin-top: 28px; }

    /* ── Vandaag kaartjes ── */
    .dag-kaart {
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 9px; border-left: 4px solid;
    }
    .dag-kaart-toets    { background: #fff5f5; border: 1px solid #ffd0d0; border-left: 4px solid #e05252; }
    .dag-kaart-huiswerk { background: #f0f5ff; border: 1px solid #c8d8ff; border-left: 4px solid #3a6edc; }
    .dag-kaart-afspraak { background: #f7f0fc; border: 1px solid #dcc8f0; border-left: 4px solid #9b59b6; }
    .dag-kaart-training { background: #f0fbf5; border: 1px solid #b8efd3; border-left: 4px solid #3ddc97; }

    .dag-kaart-type {
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px;
    }
    .dag-kaart-toets    .dag-kaart-type { color: #e05252; }
    .dag-kaart-huiswerk .dag-kaart-type { color: #3a6edc; }
    .dag-kaart-afspraak .dag-kaart-type { color: #9b59b6; }
    .dag-kaart-training .dag-kaart-type { color: #2bc47e; }

    .dag-kaart-titel { font-size: 0.93rem; font-weight: 700; color: #1a1a1a; }
    .dag-kaart-sub   { font-size: 0.8rem; color: #888; margin-top: 1px; }

    .vandaag-leeg {
      font-size: 0.9rem; color: #aaa; text-align: center;
      padding: 24px; background: #fafafa;
      border-radius: 12px; border: 1px solid #ebebeb;
    }

    .week-waarschuwing {
      background: #fffbeb; border: 1px solid #f5d060;
      border-left: 3px solid #f0b020; border-radius: 10px;
      padding: 11px 14px; font-size: 0.87rem; font-weight: 600;
      color: #7a5810; margin-bottom: 14px; line-height: 1.4;
    }

    /* ── Week rij ── */
    .week-rij { display: flex; gap: 6px; margin-bottom: 28px; }
    .week-dag {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 5px; padding: 10px 2px;
      background: #fafafa; border: 1px solid #ebebeb;
      border-radius: 12px; text-decoration: none; color: inherit;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .week-dag:active { background: #efefef; }
    .week-dag.vandaag { border-color: #3ddc97; background: #f0fbf5; }

    .wdag-letter {
      font-size: 0.55rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: #bbb;
    }
    .week-dag.vandaag .wdag-letter { color: #3ddc97; }
    .wdag-getal { font-size: 0.88rem; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .wdag-stippen { display: flex; gap: 3px; align-items: center; min-height: 6px; }
    .wdag-stip { width: 5px; height: 5px; border-radius: 50%; }

    /* ── Tip ── */
    .tip-kaart {
      background: linear-gradient(135deg, #f0fbf5, #e8f8ef);
      border: 1px solid #b8efd3; border-radius: 14px;
      padding: 15px 16px; display: flex; gap: 12px;
      align-items: flex-start; margin-top: 4px;
    }
    .tip-icoon { flex-shrink: 0; color: #3ddc97; margin-top: 1px; }
    .tip-tekst { font-size: 0.88rem; color: #2a5a40; line-height: 1.55; }
    .tip-tekst strong { color: #1a4a30; }

    /* ── Streak ── */
    .streak-blok {
      background: linear-gradient(135deg, #f0fbf5, #e8f8ef);
      border: 1px solid #b8efd3; border-radius: 14px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .streak-vlam  { font-size: 1.8rem; line-height: 1; flex-shrink: 0; }
    .streak-getal { font-size: 2.6rem; font-weight: 800; color: #1a1a1a; line-height: 1; letter-spacing: -2px; }
    .streak-label { font-size: 0.88rem; font-weight: 700; color: #2bc47e; }
    .streak-start { font-size: 0.88rem; color: #aaa; font-weight: 500; }

    @keyframes streak-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.2); }
      65%  { transform: scale(0.96); }
      100% { transform: scale(1); }
    }
    .streak-blok.record { animation: streak-pop 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

    /* ── Hamburger + menu ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
      flex-shrink: 0; margin-top: 4px;
    }
    .hamburger-btn:hover { background: #f0f0f0; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #888; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #1a1a1a; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.rood { color: #e05252; }

    /* ── Tabbar ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 1px solid #ebebeb;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #bbb;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #3ddc97; }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>

  <script>
    // ── Navigatie ──
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }

    // ── Splashscreen ──
    const splashGetoond = sessionStorage.getItem('struct_splash_shown');
    const heeftProfiel  = !!localStorage.getItem('profiel');

    function naSplash() { if (!heeftProfiel) location.replace('onboarding.html'); }

    if (!splashGetoond) {
      sessionStorage.setItem('struct_splash_shown', '1');
      document.body.classList.add('splash-actief');
      const splash = document.getElementById('splash');
      const tekst  = splash.querySelector('.splash-naam');

      // Startpositie: iets ingezoomd en letters iets verder uit elkaar
      splash.style.transform    = 'scale(0.97)';
      tekst.style.letterSpacing = '0.46em';

      requestAnimationFrame(() => requestAnimationFrame(() => {
        // Fade in: soepel inzoomen + letters samentrekken
        splash.style.transition = 'opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1)';
        splash.style.opacity    = '1';
        splash.style.transform  = 'scale(1)';
        tekst.style.transition  = 'letter-spacing 0.65s cubic-bezier(0.22,1,0.36,1)';
        tekst.style.letterSpacing = '0.3em';
      }));

      setTimeout(() => {
        // Fade out: versneld wegzoomen
        splash.style.transition = 'opacity 0.4s cubic-bezier(0.4,0,1,1), transform 0.4s cubic-bezier(0.4,0,1,1)';
        splash.style.opacity    = '0';
        splash.style.transform  = 'scale(1.04)';
        splash.addEventListener('transitionend', function handler(e) {
          if (e.propertyName !== 'opacity') return;
          splash.removeEventListener('transitionend', handler);
          splash.remove(); document.body.classList.remove('splash-actief'); naSplash();
        });
      }, 1600); // 650ms fade-in + ~950ms vasthouden
    } else {
      document.getElementById('splash').remove();
      naSplash();
    }

    // ── Hulpfuncties ──
    function normaliseer(d) { const r = new Date(d); r.setHours(0,0,0,0); return r; }
    function addDagen(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); r.setHours(0,0,0,0); return r; }
    function parseDatum(s) { return normaliseer(new Date(s + 'T00:00:00')); }
    function toDatumStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function getMaandag(d) {
      const r = normaliseer(d);
      const diff = r.getDay() === 0 ? -6 : 1 - r.getDay();
      r.setDate(r.getDate() + diff); return r;
    }

    const MAANDEN = ['januari','februari','maart','april','mei','juni',
                     'juli','augustus','september','oktober','november','december'];
    const DAGEN_LANG  = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
    const DAGEN_KORT  = ['ma','di','wo','do','vr'];
    const STANDAARD_DAGEN_LEREN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0,
                                     Schrijfvaardigheid:2, PO:14, Anders:3 };

    const vandaag    = normaliseer(new Date());
    const vandaagStr = toDatumStr(vandaag);
    const profiel    = JSON.parse(localStorage.getItem('profiel') || '{}');
    const vakken     = JSON.parse(localStorage.getItem('vakken')  || '[]');
    const afspraken  = JSON.parse(localStorage.getItem('afspraken') || '[]');

    // ── Begroeting ──
    const uur      = new Date().getHours();
    const dagdeel  = uur < 12 ? 'Goedemorgen' : uur < 18 ? 'Goedemiddag' : 'Goedenavond';
    const naamDeel = profiel.naam ? `, ${profiel.naam}` : '';
    document.getElementById('begroeting').textContent = dagdeel + naamDeel;
    document.getElementById('datum-lijn').textContent =
      `${DAGEN_LANG[vandaag.getDay()]} ${vandaag.getDate()} ${MAANDEN[vandaag.getMonth()]}`;

    // ── Data ophalen voor een dag ──
    function getItemsOpDag(dag) {
      const str = toDatumStr(dag);
      const items = [];

      vakken.forEach(v => {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : []);
        toetsen.forEach(t => {
          if (t.datum && parseDatum(t.datum).getTime() === dag.getTime()) {
            items.push({ type: 'toets', titel: v.naam, sub: t.naam || '', sortTijd: null });
          }
        });
        (v.huiswerk || []).forEach(h => {
          if (!h.inleverdatum || h.gedaan) return;
          if (h.inleverdatum.slice(0,10) === str) {
            items.push({ type: 'huiswerk', titel: v.naam, sub: h.omschrijving || '', sortTijd: null });
          }
        });
      });

      afspraken.forEach(a => {
        if (a.afgerond) return;
        const match = a.herhaling === 'wekelijks'
          ? parseDatum(a.datum).getDay() === dag.getDay() && a.datum <= str
          : a.einddatum ? a.datum <= str && str <= a.einddatum : a.datum === str;
        if (match) {
          const tijdStr = a.tijd ? (a.eindtijd ? `${a.tijd} – ${a.eindtijd}` : a.tijd) : '';
          items.push({ type: 'afspraak', titel: a.titel, sub: tijdStr, sortTijd: a.tijd || null });
        }
      });

      const trainingen = JSON.parse(localStorage.getItem('trainingen') || '[]');
      trainingen.forEach(t => {
        if (!Array.isArray(t.dagen) || !t.dagen.includes(dag.getDay())) return;
        const ti = t.tijden && t.tijden[dag.getDay()];
        if (!ti || ti.wisselend) return;
        const tijdStr = ti.begin ? `${ti.begin}${ti.eind ? `–${ti.eind}` : ''}` : '';
        items.push({ type: 'training', titel: t.naam, sub: tijdStr, sortTijd: ti.begin || null });
      });

      // Items met tijd sorteren op tijd, daarna op type
      const typePrio = { toets: 0, huiswerk: 1, afspraak: 2, training: 3 };
      items.sort((a, b) => {
        if (a.sortTijd && b.sortTijd) return a.sortTijd.localeCompare(b.sortTijd);
        if (a.sortTijd && !b.sortTijd) return -1;
        if (!a.sortTijd && b.sortTijd) return 1;
        return typePrio[a.type] - typePrio[b.type];
      });
      return items;
    }

    // ── Sectie Vandaag ──
    function renderVandaag() {
      const items = getItemsOpDag(vandaag);
      const container = document.getElementById('vandaag-lijst');
      if (!items.length) {
        container.innerHTML = '<div class="vandaag-leeg">Rustige dag — geniet ervan 🎉</div>';
        return;
      }
      const labels = { toets: 'Toets', huiswerk: 'Huiswerk', afspraak: 'Afspraak', training: 'Training' };
      container.innerHTML = items.map(item => `
        <div class="dag-kaart dag-kaart-${item.type}">
          <div class="dag-kaart-type">${labels[item.type]}</div>
          <div class="dag-kaart-titel">${item.titel}</div>
          ${item.sub ? `<div class="dag-kaart-sub">${item.sub}</div>` : ''}
        </div>`).join('');
    }

    // ── Sectie Komende week ──
    const DAG_LETTERS_ALLE = ['zo','ma','di','wo','do','vr','za'];
    function renderWeekRij() {
      const stipKleur = { toets: '#e05252', huiswerk: '#3a6edc', afspraak: '#9b59b6', training: '#3ddc97' };
      let html = '';
      for (let i = 0; i < 5; i++) {
        const dag = addDagen(vandaag, i);
        const dagStr = toDatumStr(dag);
        const isVandaag = i === 0;
        const types = [...new Set(getItemsOpDag(dag).map(x => x.type))];
        const stippen = types.slice(0, 3).map(t =>
          `<span class="wdag-stip" style="background:${stipKleur[t]}"></span>`
        ).join('');
        html += `<a href="week.html" class="week-dag${isVandaag ? ' vandaag' : ''}"
          onclick="sessionStorage.setItem('week_dag','${dagStr}')">
          <span class="wdag-letter">${DAG_LETTERS_ALLE[dag.getDay()]}</span>
          <span class="wdag-getal">${dag.getDate()}</span>
          <div class="wdag-stippen">${stippen}</div>
        </a>`;
      }
      document.getElementById('week-rij').innerHTML = html;
    }

    // ── Tip van Struct ──
    function renderTip() {
      const tip = bepaalTip();
      document.getElementById('tip-kaart').innerHTML = `
        <div class="tip-icoon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="tip-tekst">${tip}</div>`;
    }

    function bepaalTip() {
      // ── 1. Toets morgen? ──
      const morgen = addDagen(vandaag, 1);
      const morgenStr = toDatumStr(morgen);
      for (const v of vakken) {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ datum: v.toetsdatum }] : []);
        for (const t of toetsen) {
          if (t.datum === morgenStr) {
            return `Je hebt morgen <strong>${v.naam}</strong> — klaar voor de toets?`;
          }
        }
      }

      // ── 2. Drukke week? ──
      const maandag = getMaandag(vandaag);
      let weekTotaal = 0;
      for (let i = 0; i < 7; i++) weekTotaal += getItemsOpDag(addDagen(maandag, i)).length;
      if (weekTotaal >= 5) {
        return `Deze week heb je <strong>${weekTotaal} verplichtingen</strong> — begin eerder met leren.`;
      }

      // ── 3. Training vanavond? ──
      const trainingVandaag = getItemsOpDag(vandaag).filter(x => x.type === 'training');
      if (trainingVandaag.length) {
        const t = trainingVandaag[0];
        const wanneer = t.sortTijd ? `om ${t.sortTijd}` : 'vandaag';
        return `${t.titel} ${wanneer} — zorg dat je op tijd klaar bent.`;
      }

      // ── 4. Generieke tips, roteren per dag ──
      const generiek = [
        'Korte studiesessies van 25 minuten werken beter dan lang achter elkaar.',
        'Schrijf stof over in je eigen woorden — dat helpt met onthouden.',
        'Begin moeilijke onderwerpen als eerste, als je hoofd nog fris is.',
        'Na het leren even bewegen helpt de stof te verankeren.',
        'Plan je leermomenten in je agenda, net zoals afspraken.',
        'Herhaling na een dag, een week en een maand zorgt voor langdurig geheugen.',
        'Zorg voor voldoende slaap — je brein verwerkt geleerde stof tijdens het slapen.',
      ];
      const dagVanJaar = Math.floor((vandaag - new Date(vandaag.getFullYear(), 0, 0)) / 86400000);
      return generiek[dagVanJaar % generiek.length];
    }

    // ── Weekdruk-waarschuwing ──
    function berekenWeekScore(weekMaandag) {
      const werk2       = JSON.parse(localStorage.getItem('werk')       || '[]');
      const trainingen2 = JSON.parse(localStorage.getItem('trainingen') || '[]');
      const werkDagen2     = new Set(werk2.flatMap(e => Array.isArray(e.dagen) ? e.dagen : []));
      const trainingDagen2 = new Set(trainingen2.flatMap(e => Array.isArray(e.dagen) ? e.dagen : []));
      let score = werkDagen2.size + trainingDagen2.size;
      const weekEinde = addDagen(weekMaandag, 7);
      vakken.forEach(v => {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ datum: v.toetsdatum }] : []);
        toetsen.forEach(t => {
          if (!t.datum) return;
          const d = parseDatum(t.datum);
          if (d >= weekMaandag && d < weekEinde) score++;
        });
      });
      return score;
    }

    function renderWeekWaarschuwing() {
      const maandag = getMaandag(vandaag);
      let banner = '';
      for (let w = 0; w < 4; w++) {
        const wMaandag = addDagen(maandag, w * 7);
        if (addDagen(wMaandag, 6).getTime() < vandaag.getTime()) continue; // week al voorbij
        if (berekenWeekScore(wMaandag) > 4) {
          const datumStr = wMaandag.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
          banner = `<div class="week-waarschuwing">⚠️ Drukke week van ${datumStr} — begin eerder met leren</div>`;
          break;
        }
      }
      document.getElementById('week-waarschuwing').innerHTML = banner;
    }

    // ── Streak ──
    const STREAK_LEER = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0, Schrijfvaardigheid:2, PO:14, Anders:3 };

    function getLeerDagenStreak(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key  = type || 'Anders';
      const basis = inst[key] !== undefined ? inst[key] : (STREAK_LEER[key] ?? STREAK_LEER.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function getVakAanpassingStreak(naam) {
      return JSON.parse(localStorage.getItem('feedback') || '[]')
        .filter(f => f.vak === naam)
        .reduce((s, f) => s + (f.antwoord === 'te-weinig' ? 2 : f.antwoord === 'te-veel' ? -1 : 0), 0);
    }

    function heeftGemisteBegindatum() {
      for (const v of vakken) {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ datum: v.toetsdatum }] : []);
        for (const t of toetsen) {
          if (!t.datum) continue;
          const toetsDatum = parseDatum(t.datum);
          const dagsTotToets = Math.round((toetsDatum - vandaag) / 86400000);
          if (dagsTotToets < 0) continue;
          const startDagen = getLeerDagenStreak(t.type, v.moeilijkheid) + getVakAanpassingStreak(v.naam);
          if (startDagen > 0 && dagsTotToets < startDagen) return true;
        }
      }
      return false;
    }

    function updateStreak() {
      const str      = toDatumStr(vandaag);
      const gisteren = toDatumStr(addDagen(vandaag, -1));
      const huidig   = parseInt(localStorage.getItem('streak_huidig')         || '0');
      const langste  = parseInt(localStorage.getItem('streak_langste')        || '0');
      const last     = localStorage.getItem('streak_laatste_datum')           || '';
      const gemist   = heeftGemisteBegindatum();

      let nieuw;
      if (gemist) {
        nieuw = 0;
      } else if (last === str) {
        nieuw = huidig;
      } else if (last === gisteren) {
        nieuw = huidig + 1;
      } else {
        nieuw = 1; // eerste keer of na een gat
      }

      const nieuwRecord = nieuw > langste && nieuw > 1;
      localStorage.setItem('streak_huidig', String(nieuw));
      localStorage.setItem('streak_laatste_datum', str);
      if (nieuw > langste) localStorage.setItem('streak_langste', String(nieuw));
      return { huidig: nieuw, nieuwRecord };
    }

    function renderStreak(data) {
      const { huidig, nieuwRecord } = data;
      const blok = document.getElementById('streak-blok');
      if (huidig === 0) {
        blok.innerHTML = '<span class="streak-vlam">🔥</span><span class="streak-start">Start vandaag je streak</span>';
      } else {
        const mv = huidig === 1 ? 'dag' : 'dagen';
        blok.innerHTML = `
          <span class="streak-vlam">🔥</span>
          <span class="streak-getal">${huidig}</span>
          <span class="streak-label" id="streak-label">${mv} op rij</span>`;
        if (nieuwRecord) {
          const key = 'streak_record_' + huidig;
          if (!sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1');
            const lbl = document.getElementById('streak-label');
            lbl.textContent = 'Nieuw record! 🎉';
            setTimeout(() => { const l = document.getElementById('streak-label'); if (l) l.textContent = `${mv} op rij`; }, 3000);
            blok.classList.add('record');
            setTimeout(() => blok.classList.remove('record'), 600);
          }
        }
      }
    }

    renderStreak(updateStreak());
    renderWeekWaarschuwing();
    renderVandaag();
    renderWeekRij();
    renderTip();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
