<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <title>Studiegids</title>
  <script>
    if (!localStorage.getItem('profiel')) location.replace('onboarding.html');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .center {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .tagline {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0 0 8px;
      line-height: 1.2;
    }

    .sub {
      font-size: 0.95rem;
      color: #444;
      margin: 0 0 48px;
    }

    .knoppen {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: block;
      padding: 18px 24px;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: #4f8ef7;
      color: #fff;
      border: 1px solid transparent;
    }
    .btn-primary:hover { background: #3a7ef0; }

    .btn-secondary {
      background: #161616;
      color: #e8e8e8;
      border: 1px solid #262626;
    }
    .btn-secondary:hover { border-color: #404040; background: #1c1c1c; }

    .reset-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: none;
      border: 1px solid #2a2a2a;
      color: #444;
      font-size: 0.72rem;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .reset-btn:hover { color: #e8e8e8; border-color: #555; }
  </style>
</head>
<body>
  <div class="center">
    <h1 class="tagline">Jouw slimme studiegids.</h1>
    <p class="sub">Weet wat je moet leren. En wanneer.</p>
    <div class="knoppen">
      <a href="vakken.html"    class="btn btn-primary">Mijn vakken</a>
      <a href="overzicht.html" class="btn btn-secondary">Overzicht</a>
    </div>
  </div>

  <button class="reset-btn" onclick="localStorage.removeItem('profiel'); location.replace('onboarding.html')">Reset onboarding</button>
</body>
</html>
