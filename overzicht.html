<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="color-scheme" content="light">
  <title>Toetsen – Struct</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3ddc97">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Struct">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff; color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 90px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; color: #1a1a1a; }

    .groep { margin-bottom: 32px; }

    .groep-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .groep-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .groep-label {
      font-size: 0.7rem; font-weight: 800;
      letter-spacing: 0.3px; color: #b0b0b0;
      flex: 1;
    }
    .groep-count {
      font-size: 0.68rem; color: #bbb; font-weight: 700;
      background: #f0f0f0; border-radius: 20px; padding: 2px 8px;
    }

    details.groep summary { list-style: none; }
    details.groep summary::-webkit-details-marker { display: none; }
    details.groep summary .groep-header { cursor: pointer; }

    .groep-kaarten { display: flex; flex-direction: column; gap: 10px; }

    /* Toetskaart — zelfde stijl als week.html tijdblokken */
    .toets-kaart {
      background: #fff;
      border: 1px solid #e8e8e8; border-left: 3.5px solid #ccc;
      border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: box-shadow 0.18s;
    }
    .toets-kaart:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .toets-kaart.urgent        { border-left-color: #e05252; background: #fff8f8; border-color: #fcd8d8; }
    .toets-kaart.deze-week     { border-left-color: #f09040; background: #fffaf5; border-color: #fde4c0; }
    .toets-kaart.volgende-week { border-left-color: #c8a820; background: #fffdee; border-color: #f0e090; }
    .toets-kaart.later         { border-left-color: #ccc; }
    .toets-kaart.verlopen      { border-left-color: #ddd; opacity: 0.45; }

    .kaart-datumrij {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .kaart-datum-tekst {
      font-size: 0.71rem; font-weight: 800; color: #b0b0b0; letter-spacing: 0.04em;
    }
    .dagen-pill {
      font-size: 0.72rem; font-weight: 700;
      border-radius: 20px; padding: 3px 10px;
      white-space: nowrap; flex-shrink: 0;
    }

    .vak-naam {
      font-size: 1.05rem; font-weight: 800; line-height: 1.2;
      letter-spacing: -0.2px; color: #111; margin-bottom: 2px;
    }
    .verlopen .vak-naam { text-decoration: line-through; color: #bbb; }
    .toets-type { font-size: 0.8rem; color: #999; margin-bottom: 0; }

    .drukke-badge {
      display: inline-block; font-size: 0.69rem; font-weight: 700;
      color: #c07820; background: #fff8f0; border: 1px solid #f0c890;
      border-radius: 20px; padding: 2px 9px; margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .week-waarschuwing {
      background: #fffbeb; border: 1px solid #f5d060;
      border-left: 3px solid #f0b020; border-radius: 12px;
      padding: 11px 14px; font-size: 0.87rem; font-weight: 600;
      color: #7a5810; margin-bottom: 16px; line-height: 1.4;
    }

    .kaart-advies { margin-top: 10px; font-size: 0.83rem; font-weight: 600; line-height: 1.45; }
    .leeradvies   { color: #2bc47e; }
    .waarschuwing { color: #e05252; }

    .feedback-kaart {
      background: #fff; border: 1px solid #e0efe8;
      border-left: 3.5px solid #3ddc97; border-radius: 14px;
      padding: 15px 16px; box-shadow: 0 1px 4px rgba(61,220,151,0.08);
    }
    .feedback-vraag { font-size: 0.92rem; font-weight: 700; color: #111; margin-bottom: 2px; }
    .feedback-info  { font-size: 0.78rem; color: #bbb; margin-bottom: 12px; }
    .feedback-knoppen { display: flex; gap: 7px; }
    .feedback-btn {
      flex: 1; padding: 9px 4px; border-radius: 10px;
      font-size: 0.76rem; font-weight: 700; cursor: pointer;
      font-family: inherit; border: 1.5px solid; text-align: center;
      transition: all 0.15s;
    }
    .feedback-btn:active { transform: scale(0.96); }
    .feedback-btn.te-weinig { color: #e05252; border-color: #fcd8d8; background: #fff5f5; }
    .feedback-btn.precies   { color: #2bc47e; border-color: #afe8c8; background: #edfaf3; }
    .feedback-btn.te-veel   { color: #3a6edc; border-color: #c4d4ff; background: #f0f4ff; }

    .geen {
      text-align: center; color: #c0c0c0;
      font-size: 0.88rem; padding: 48px 0 24px; font-weight: 500;
    }

    /* ── Navigatie ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn:hover { background: #f0f0f0; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #888; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #1a1a1a; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.rood { color: #e05252; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; position: relative;
      align-items: center; gap: 3px; padding: 11px 4px 13px;
      text-decoration: none; color: #c0c0c0;
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent; transition: color 0.18s;
    }
    .tab:active { opacity: 0.6; }
    .tab.actief { color: #2bc47e; }
    .tab.actief::after {
      content: ''; position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 28px; height: 2.5px;
      background: #3ddc97; border-radius: 0 0 3px 3px;
    }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>

  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }

    function laad() {
      const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');
      return vakken.map(v => {
        if (!v.toetsen) v.toetsen = v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : [];
        return v;
      });
    }

    const STANDAARD_DAGEN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0, Schrijfvaardigheid:2, PO:14, Anders:3 };

    function getLeerDagen(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key = type || 'Anders';
      const basis = inst[key] !== undefined ? inst[key] : (STANDAARD_DAGEN[key] !== undefined ? STANDAARD_DAGEN[key] : STANDAARD_DAGEN.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function verschuifNaarVrijeDag(d) {
      const werk       = JSON.parse(localStorage.getItem('werk')       || '[]');
      const trainingen = JSON.parse(localStorage.getItem('trainingen') || '[]');
      function isBezet(dag) {
        const w = dag.getDay();
        return werk.some(e => Array.isArray(e.dagen) && e.dagen.includes(w)) ||
               trainingen.some(e => Array.isArray(e.dagen) && e.dagen.includes(w));
      }
      const datum = new Date(d); datum.setHours(0,0,0,0);
      let verschoven = false, max = 14;
      while (isBezet(datum) && max-- > 0) { datum.setDate(datum.getDate() - 1); verschoven = true; }
      return { datum, verschoven };
    }

    function getCijferAanpassing(vakNaam) {
      const cijfers = JSON.parse(localStorage.getItem('cijfers') || '[]');
      const vakCijfers = cijfers.filter(c => c.vakNaam === vakNaam).map(c => c.cijfer);
      if (!vakCijfers.length) return 0;
      const gem = vakCijfers.reduce((s, c) => s + c, 0) / vakCijfers.length;
      if (gem >= 6) return 0;
      const feedback = JSON.parse(localStorage.getItem('feedback') || '[]');
      return feedback.some(f => f.vak === vakNaam && f.antwoord === 'te-weinig') ? 2 : 0;
    }

    function formatDatum(d) {
      return d ? new Date(d).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' }) : '—';
    }

    function dagenTekst(n) {
      if (n === 0) return 'vandaag';
      if (n === 1) return 'morgen';
      if (n < 0)  return `${Math.abs(n)}d geleden`;
      return `over ${n} dagen`;
    }

    function isoWeek(datum) {
      const d = new Date(datum);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
      const w1 = new Date(d.getFullYear(), 0, 4);
      return d.getFullYear() + '-W' + String(1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7)).padStart(2, '0');
    }

    function getVakAanpassing(vakNaam) {
      return JSON.parse(localStorage.getItem('feedback') || '[]')
        .filter(f => f.vak === vakNaam)
        .reduce((acc, f) => acc + (f.antwoord === 'te-weinig' ? 2 : f.antwoord === 'te-veel' ? -1 : 0), 0);
    }

    let _fbItems = [];

    function geefFeedback(idx, antwoord) {
      const r = _fbItems[idx];
      if (!r) return;
      const id = r.vak + '|' + r.toets.naam + '|' + r.toets.datum;
      const lijst = JSON.parse(localStorage.getItem('feedback') || '[]');
      if (!lijst.find(f => f.id === id)) {
        lijst.push({ id, vak: r.vak, toets: r.toets.naam, datum: r.toets.datum, antwoord });
        localStorage.setItem('feedback', JSON.stringify(lijst));
      }
      render();
    }

    function renderFeedbackKaart(r, idx) {
      return `<div class="feedback-kaart">
        <div class="feedback-vraag">Had je genoeg tijd om te leren voor <strong>${r.vak}</strong>?</div>
        <div class="feedback-info">${r.toets.naam} · ${formatDatum(r.toets.datum)}</div>
        <div class="feedback-knoppen">
          <button class="feedback-btn te-weinig" onclick="geefFeedback(${idx},'te-weinig')">Te weinig</button>
          <button class="feedback-btn precies"   onclick="geefFeedback(${idx},'precies')">Precies goed</button>
          <button class="feedback-btn te-veel"   onclick="geefFeedback(${idx},'te-veel')">Te veel</button>
        </div>
      </div>`;
    }

    function getMaandagVanIsoWeek(isoWeekStr) {
      const [jaarStr, weekStr] = isoWeekStr.split('-W');
      const jaar = parseInt(jaarStr), week = parseInt(weekStr);
      const jan4 = new Date(jaar, 0, 4);
      const jan4Dag = (jan4.getDay() + 6) % 7;
      const maandag = new Date(jan4);
      maandag.setDate(jan4.getDate() - jan4Dag + (week - 1) * 7);
      return maandag;
    }

    function categoriseer(dagsTotToets, dagsTotBegin) {
      if (dagsTotToets === null) return 'later';
      if (dagsTotToets < 0)     return 'verlopen';
      if (dagsTotBegin < 0)     return 'urgent';
      if (dagsTotToets <= 7)    return 'deze-week';
      if (dagsTotToets <= 14)   return 'volgende-week';
      return 'later';
    }

    function renderKaart(r) {
      const { categorie, dagsTotToets, dagsTotBegin, vak, moeilijkheid, toets } = r;
      const pilStijl = {
        'urgent':        'background:#fff0f0;color:#e05252',
        'deze-week':     'background:#fff4e8;color:#d07030',
        'volgende-week': 'background:#fffce0;color:#a08010',
        'later':         'background:#f0f0f0;color:#999',
        'verlopen':      'background:#f5f5f5;color:#bbb',
      }[categorie] || '';
      const dagenStr = dagsTotToets !== null ? dagenTekst(dagsTotToets) : null;
      const drukBadge = r.drukkeWeek ? `<div class="drukke-badge">Drukke week</div>` : '';
      let advies = '';
      if (categorie === 'urgent') {
        advies = `<div class="kaart-advies waarschuwing">Hier moet je echt mee beginnen.</div>`;
      } else if (categorie !== 'verlopen' && dagsTotBegin !== null) {
        const extraDagen = r.drukkeWeek ? 2 : 0;
        const beginD = new Date(toets.datum + 'T00:00:00');
        beginD.setDate(beginD.getDate() - getLeerDagen(toets.type, moeilijkheid) - extraDagen - (r.vakAanpassing || 0));
        const { datum: vrijBegin, verschoven } = verschuifNaarVrijeDag(beginD);
        const vm = JSON.parse(localStorage.getItem('vrijeMomenten') || '{}');
        const vrijTijd = vm[vrijBegin.getDay()];
        const tijdDeel = vrijTijd ? `, vrij vanaf ${vrijTijd}` : '';
        advies = `<div class="kaart-advies leeradvies">Begin op ${vrijBegin.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' })}${tijdDeel}${verschoven ? ' (werkdag overgeslagen)' : ''}</div>`;
      }
      return `<div class="toets-kaart ${categorie}">
        ${drukBadge}
        <div class="kaart-datumrij">
          <span class="kaart-datum-tekst">${formatDatum(toets.datum)}</span>
          ${dagenStr ? `<span class="dagen-pill" style="${pilStijl}">${dagenStr}</span>` : ''}
        </div>
        <div class="vak-naam">${vak}</div>
        <div class="toets-type">${toets.naam}</div>
        ${advies}
      </div>`;
    }

    function render() {
      const vakken = laad();
      const vandaag = new Date();
      vandaag.setHours(0, 0, 0, 0);
      const items = [];
      vakken.forEach(v => {
        v.toetsen.forEach(t => {
          let dagsTotToets = null;
          if (t.datum) {
            const d = new Date(t.datum);
            d.setHours(0, 0, 0, 0);
            dagsTotToets = Math.round((d - vandaag) / 86400000);
          }
          if (dagsTotToets !== null && dagsTotToets < -7) return; // meer dan 7 dagen voorbij
          const vakAanpassing = getVakAanpassing(v.naam);
          const startDagen = getLeerDagen(t.type, v.moeilijkheid) + vakAanpassing + getCijferAanpassing(v.naam);
          const dagsTotBegin = dagsTotToets !== null ? dagsTotToets - startDagen : null;
          items.push({ vak: v.naam, moeilijkheid: v.moeilijkheid, toets: t, dagsTotToets, dagsTotBegin, categorie: categoriseer(dagsTotToets, dagsTotBegin), vakAanpassing });
        });
      });

      // Weekdruk-scoring: alleen toetsen + huiswerk deadlines + eenmalige afspraken
      const weekTelling = {};
      // Toetsen per week
      items.forEach(r => {
        if (r.toets.datum && r.categorie !== 'verlopen') {
          const w = isoWeek(r.toets.datum);
          weekTelling[w] = (weekTelling[w] || 0) + 1;
        }
      });
      // Huiswerk deadlines per week
      vakken.forEach(v => {
        (v.huiswerk || []).forEach(h => {
          if (!h.inleverdatum || h.gedaan) return;
          const w = isoWeek(h.inleverdatum.slice(0,10));
          weekTelling[w] = (weekTelling[w] || 0) + 1;
        });
      });
      // Eenmalige afspraken (geen wekelijks) per week
      const afspraken2 = JSON.parse(localStorage.getItem('afspraken') || '[]');
      afspraken2.forEach(a => {
        if (a.afgerond || a.herhaling === 'wekelijks' || !a.datum) return;
        const w = isoWeek(a.datum);
        weekTelling[w] = (weekTelling[w] || 0) + 1;
      });

      items.forEach(r => {
        const score = r.toets.datum && r.categorie !== 'verlopen'
          ? (weekTelling[isoWeek(r.toets.datum)] || 0) : 0;
        r.drukkeWeek = score >= 3;
      });

      // Waarschuwingsbanner: alleen eerstvolgende drukke week die nog niet voorbij is
      const drukkeWeken = [...new Set(items.filter(r => r.drukkeWeek && r.toets.datum).map(r => isoWeek(r.toets.datum)))]
        .filter(wk => {
          const ma = getMaandagVanIsoWeek(wk);
          const zo = new Date(ma); zo.setDate(ma.getDate() + 6); zo.setHours(0,0,0,0);
          return zo.getTime() >= vandaag.getTime();
        })
        .sort()
        .slice(0, 1);
      document.getElementById('week-waarschuwingen').innerHTML = drukkeWeken.map(wk => {
        const ma = getMaandagVanIsoWeek(wk);
        const datumStr = ma.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
        return `<div class="week-waarschuwing">Drukke week van ${datumStr}, begin alvast eerder.</div>`;
      }).join('');
      items.sort((a, b) => {
        if (!a.toets.datum && !b.toets.datum) return 0;
        if (!a.toets.datum) return 1;
        if (!b.toets.datum) return -1;
        return new Date(a.toets.datum) - new Date(b.toets.datum);
      });

      const inhoud = document.getElementById('inhoud');
      if (!items.length) { document.getElementById('leeg').style.display = 'block'; inhoud.innerHTML = ''; return; }
      document.getElementById('leeg').style.display = 'none';

      const secties = [
        { id: 'urgent',        label: 'Actie vereist', dot: '#e05252' },
        { id: 'deze-week',     label: 'Deze week',        dot: '#f0a050' },
        { id: 'volgende-week', label: 'Volgende week',    dot: '#c8b030' },
        { id: 'later',         label: 'Later',            dot: '#ccc'    },
      ];
      // Feedback: verlopen toetsen van afgelopen 7 dagen zonder feedback
      const feedbackLijst = JSON.parse(localStorage.getItem('feedback') || '[]');
      const feedbackNodig = items.filter(r => {
        if (!r.toets.datum || r.dagsTotToets === null) return false;
        if (r.dagsTotToets >= 0 || r.dagsTotToets < -7) return false;
        const id = r.vak + '|' + r.toets.naam + '|' + r.toets.datum;
        return !feedbackLijst.find(f => f.id === id);
      });
      _fbItems = feedbackNodig;

      const verlopen = items.filter(r => r.categorie === 'verlopen');
      let html = feedbackNodig.length
        ? `<section class="groep">
            <div class="groep-header">
              <span class="groep-dot" style="background:#3ddc97"></span>
              <span class="groep-label">Hoe ging het?</span>
              <span class="groep-count">${feedbackNodig.length}</span>
            </div>
            <div class="groep-kaarten">${feedbackNodig.map((r, i) => renderFeedbackKaart(r, i)).join('')}</div>
          </section>`
        : '';
      secties.forEach(s => {
        const groep = items.filter(r => r.categorie === s.id);
        if (!groep.length) return;
        html += `<section class="groep">
          <div class="groep-header">
            <span class="groep-dot" style="background:${s.dot}"></span>
            <span class="groep-label">${s.label}</span>
            <span class="groep-count">${groep.length}</span>
          </div>
          <div class="groep-kaarten">${groep.map(renderKaart).join('')}</div>
        </section>`;
      });
      if (verlopen.length) {
        html += `<details class="groep">
          <summary>
            <div class="groep-header">
              <span class="groep-dot" style="background:#ccc"></span>
              <span class="groep-label">Afgelopen</span>
              <span class="groep-count">${verlopen.length}</span>
            </div>
          </summary>
          <div class="groep-kaarten">${verlopen.map(renderKaart).join('')}</div>
        </details>`;
      }
      inhoud.innerHTML = html;
    }

    render();
  </script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
