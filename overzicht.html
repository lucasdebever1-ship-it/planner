<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Toetsen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 90px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; color: #1a1a1a; }

    .groep { margin-bottom: 36px; }

    .groep-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .groep-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .groep-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.9px; color: #888;
    }
    .groep-count {
      font-size: 0.7rem; color: #aaa;
      background: #f0f0f0; border-radius: 20px; padding: 1px 8px;
    }

    details.groep summary { list-style: none; }
    details.groep summary::-webkit-details-marker { display: none; }
    details.groep summary .groep-header { cursor: pointer; }
    details.groep summary .groep-label { color: #bbb; }

    .groep-kaarten { display: flex; flex-direction: column; gap: 16px; }

    .toets-kaart {
      background: #f5f5f5;
      border: 1px solid #ebebeb;
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .toets-kaart:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .toets-kaart.urgent  { background: #fff5f5; border-color: #ffd0d0; }
    .toets-kaart.verlopen { opacity: 0.4; }

    .drukke-badge {
      display: inline-block; font-size: 0.72rem; font-weight: 700;
      color: #c07820; background: #fff8f0; border: 1px solid #f0c890;
      border-radius: 20px; padding: 3px 10px; margin-bottom: 12px;
      letter-spacing: 0.03em;
    }

    .vak-naam { font-size: 1.3rem; font-weight: 800; line-height: 1.2; margin-bottom: 4px; letter-spacing: -0.2px; color: #1a1a1a; }
    .verlopen .vak-naam { text-decoration: line-through; color: #bbb; }
    .toets-type { font-size: 0.9rem; color: #6b6b6b; margin-bottom: 14px; }

    .kaart-midden {
      display: flex; justify-content: space-between; align-items: flex-end; gap: 10px;
    }
    .toets-datum-groot { font-size: 1.05rem; font-weight: 600; color: #444; }

    .dagen-pill {
      font-size: 0.8rem; font-weight: 700;
      border-radius: 20px; padding: 5px 12px;
      white-space: nowrap; flex-shrink: 0;
    }

    .kaart-advies { margin-top: 14px; font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
    .leeradvies   { color: #2bc47e; }
    .waarschuwing { color: #e05252; }

    .geen { color: #aaa; font-size: 0.9rem; margin-top: 8px; }

    /* ── Navigatie ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn:hover { background: #f0f0f0; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #888; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #1a1a1a; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.rood { color: #e05252; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 1px solid #ebebeb;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #bbb;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #3ddc97; }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Toetsen</h1>
    <button class="hamburger-btn" id="hamburger" aria-label="Menu">
      <span class="hamburger-streep"></span>
      <span class="hamburger-streep"></span>
      <span class="hamburger-streep"></span>
    </button>
  </div>

  <div id="inhoud"></div>
  <p id="leeg" class="geen" style="display:none">
    Geen toetsen gevonden. Voeg vakken en toetsen toe via de vakken-pagina.
  </p>

  <!-- Menu -->
  <div class="menu-overlay" id="menu-overlay">
    <div class="menu-achtergrond" onclick="sluitMenu()"></div>
    <div class="menu-kaart">
      <a href="instellingen.html" class="menu-item" onclick="sluitMenu()">⚙️&nbsp; Instellingen</a>
      <button class="menu-item rood" onclick="resetProfiel()">🔄&nbsp; Profiel resetten</button>
    </div>
  </div>

  <!-- Tabbar -->
  <nav class="tabbar">
    <a href="index.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11L12 3L21 11V21H15V16H9V21H3V11Z"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><path d="M3 11L12 3L21 11V21H15V16H9V21H3V11Z" fill="#3ddc97"/></svg>
      </span>Home</a>
    <a href="vakken.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7V20"/><path d="M12 7C10.5 5.8 8 5.5 5 6.5V20C8 19 10.5 19.5 12 20"/><path d="M12 7C13.5 5.8 16 5.5 19 6.5V20C16 19 13.5 19.5 12 20"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><path d="M11 7.5C9.5 6.3 7 5.8 4.5 6.8V20C7 19 9.5 19.5 11 20.5V7.5Z" fill="#3ddc97"/><path d="M13 7.5C14.5 6.3 17 5.8 19.5 6.8V20C17 19 14.5 19.5 13 20.5V7.5Z" fill="#3ddc97"/></svg>
      </span>Vakken</a>
    <a href="week.html" class="tab">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="17" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="7" y1="14" x2="10.5" y2="14"/><line x1="13.5" y1="14" x2="17" y2="14"/><line x1="7" y1="18" x2="10.5" y2="18"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="17" rx="2" fill="#3ddc97"/><rect x="7" y="3" width="2" height="4" rx="1" fill="#3ddc97"/><rect x="15" y="3" width="2" height="4" rx="1" fill="#3ddc97"/><line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/><line x1="7" y1="14" x2="10.5" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/><line x1="13.5" y1="14" x2="17" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/><line x1="7" y1="18" x2="10.5" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.5"/></svg>
      </span>Week</a>
    <a href="overzicht.html" class="tab actief">
      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="3" rx="1"/><path d="M8.5 13L11 15.5L15.5 10"/></svg>
        <svg class="icoon-filled"  width="22" height="22" viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2" fill="#3ddc97"/><rect x="9" y="2" width="6" height="3" rx="1" fill="#2bc47e"/><path d="M8.5 13L11 15.5L15.5 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </span>Toetsen</a>
  </nav>

  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }

    function laad() {
      const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');
      return vakken.map(v => {
        if (!v.toetsen) v.toetsen = v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : [];
        return v;
      });
    }

    const STANDAARD_DAGEN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0, Schrijfvaardigheid:2, PO:14, Anders:3 };

    function getLeerDagen(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key = type || 'Anders';
      const basis = inst[key] !== undefined ? inst[key] : (STANDAARD_DAGEN[key] !== undefined ? STANDAARD_DAGEN[key] : STANDAARD_DAGEN.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function formatDatum(d) {
      return d ? new Date(d).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' }) : '—';
    }

    function dagenTekst(n) {
      if (n === 0) return 'vandaag';
      if (n === 1) return 'morgen';
      if (n < 0)  return `${Math.abs(n)}d geleden`;
      return `over ${n} dagen`;
    }

    function isoWeek(datum) {
      const d = new Date(datum);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
      const w1 = new Date(d.getFullYear(), 0, 4);
      return d.getFullYear() + '-W' + String(1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7)).padStart(2, '0');
    }

    function categoriseer(dagsTotToets, dagsTotBegin) {
      if (dagsTotToets === null) return 'later';
      if (dagsTotToets < 0)     return 'verlopen';
      if (dagsTotBegin < 0)     return 'urgent';
      if (dagsTotToets <= 7)    return 'deze-week';
      if (dagsTotToets <= 14)   return 'volgende-week';
      return 'later';
    }

    function renderKaart(r) {
      const { categorie, dagsTotToets, dagsTotBegin, vak, moeilijkheid, toets } = r;
      const pilStijl = {
        'urgent':        'background:#fff0f0;color:#e05252',
        'deze-week':     'background:#fff8f0;color:#d07030',
        'volgende-week': 'background:#fffcf0;color:#b09020',
        'later':         'background:#f0f0f0;color:#888',
        'verlopen':      'background:#f5f5f5;color:#bbb',
      }[categorie] || '';
      const dagenStr = dagsTotToets !== null ? dagenTekst(dagsTotToets) : null;
      const drukBadge = r.drukkeWeek ? `<div class="drukke-badge">Drukke week</div>` : '';
      let advies = '';
      if (categorie === 'urgent') {
        advies = `<div class="kaart-advies waarschuwing">⚠️ Je bent te laat met beginnen!</div>`;
      } else if (categorie !== 'verlopen' && dagsTotBegin !== null) {
        const extraDagen = r.drukkeWeek ? 2 : 0;
        const beginD = new Date(toets.datum);
        beginD.setDate(beginD.getDate() - getLeerDagen(toets.type, moeilijkheid) - extraDagen);
        advies = `<div class="kaart-advies leeradvies">📚 Begin op ${beginD.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' })}</div>`;
      }
      return `<div class="toets-kaart ${categorie}">
        ${drukBadge}
        <div class="vak-naam">${vak}</div>
        <div class="toets-type">${toets.naam}</div>
        <div class="kaart-midden">
          <span class="toets-datum-groot">${formatDatum(toets.datum)}</span>
          ${dagenStr ? `<span class="dagen-pill" style="${pilStijl}">${dagenStr}</span>` : ''}
        </div>
        ${advies}
      </div>`;
    }

    function render() {
      const vakken = laad();
      const vandaag = new Date();
      vandaag.setHours(0, 0, 0, 0);
      const items = [];
      vakken.forEach(v => {
        v.toetsen.forEach(t => {
          let dagsTotToets = null;
          if (t.datum) {
            const d = new Date(t.datum);
            d.setHours(0, 0, 0, 0);
            dagsTotToets = Math.round((d - vandaag) / 86400000);
          }
          const startDagen = getLeerDagen(t.type, v.moeilijkheid);
          const dagsTotBegin = dagsTotToets !== null ? dagsTotToets - startDagen : null;
          items.push({ vak: v.naam, moeilijkheid: v.moeilijkheid, toets: t, dagsTotToets, dagsTotBegin, categorie: categoriseer(dagsTotToets, dagsTotBegin) });
        });
      });

      const weekTelling = {};
      items.forEach(r => {
        if (r.toets.datum && r.categorie !== 'verlopen') {
          const w = isoWeek(r.toets.datum); weekTelling[w] = (weekTelling[w] || 0) + 1;
        }
      });
      items.forEach(r => {
        r.drukkeWeek = !!(r.toets.datum && r.categorie !== 'verlopen' && weekTelling[isoWeek(r.toets.datum)] > 1);
      });
      items.sort((a, b) => {
        if (!a.toets.datum && !b.toets.datum) return 0;
        if (!a.toets.datum) return 1;
        if (!b.toets.datum) return -1;
        return new Date(a.toets.datum) - new Date(b.toets.datum);
      });

      const inhoud = document.getElementById('inhoud');
      if (!items.length) { document.getElementById('leeg').style.display = ''; inhoud.innerHTML = ''; return; }

      const secties = [
        { id: 'urgent',        label: 'Op tijd beginnen', dot: '#e05252' },
        { id: 'deze-week',     label: 'Deze week',        dot: '#f0a050' },
        { id: 'volgende-week', label: 'Volgende week',    dot: '#c8b030' },
        { id: 'later',         label: 'Later',            dot: '#ccc'    },
      ];
      const verlopen = items.filter(r => r.categorie === 'verlopen');
      let html = '';
      secties.forEach(s => {
        const groep = items.filter(r => r.categorie === s.id);
        if (!groep.length) return;
        html += `<section class="groep">
          <div class="groep-header">
            <span class="groep-dot" style="background:${s.dot}"></span>
            <span class="groep-label">${s.label}</span>
            <span class="groep-count">${groep.length}</span>
          </div>
          <div class="groep-kaarten">${groep.map(renderKaart).join('')}</div>
        </section>`;
      });
      if (verlopen.length) {
        html += `<details class="groep">
          <summary>
            <div class="groep-header">
              <span class="groep-dot" style="background:#ccc"></span>
              <span class="groep-label">Afgelopen</span>
              <span class="groep-count">${verlopen.length}</span>
            </div>
          </summary>
          <div class="groep-kaarten">${verlopen.map(renderKaart).join('')}</div>
        </details>`;
      }
      inhoud.innerHTML = html;
    }

    render();
  </script>
</body>
</html>
