<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark">
  <title>Toetsoverzicht</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }

    .btn-terug {
      background: #161616;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #4f8ef7;
      font-size: 0.85rem;
      padding: 7px 14px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-terug:hover { background: #192840; border-color: #4f8ef7; }

    /* Kaarten */
    #lijst { display: flex; flex-direction: column; gap: 12px; }

    .toets-kaart {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 14px;
      padding: 18px 20px;
      transition: border-color 0.15s;
    }
    .toets-kaart:hover { border-color: #303030; }
    .toets-kaart.verlopen { opacity: 0.4; }

    .kaart-vak {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .kaart-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toets-naam-badge {
      font-size: 0.82rem;
      color: #7fb3ff;
      background: #192840;
      border: 1px solid #1e3558;
      border-radius: 20px;
      padding: 3px 11px;
    }

    .toets-datum {
      font-size: 0.85rem;
      color: #888;
    }

    .leeradvies {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #3dcc7a;
    }

    .geen {
      color: #333;
      font-size: 0.9rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Toetsoverzicht</h1>
    <a href="vakken.html" class="btn-terug">← Terug naar vakken</a>
  </div>

  <div id="lijst"></div>
  <p id="leeg" class="geen" style="display:none">Geen toetsen gevonden. Voeg vakken en toetsen toe via de vakken-pagina.</p>

  <script>
    function laad() {
      const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');
      return vakken.map(v => {
        if (!v.toetsen) {
          v.toetsen = v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : [];
        }
        return v;
      });
    }

    function formatDatum(d) {
      return d ? new Date(d).toLocaleDateString('nl-NL') : '—';
    }

    function berekenBeginDatum(datum, moeilijkheid) {
      if (!datum) return null;
      const dagen = Math.round(moeilijkheid / 2 + 1);
      const d = new Date(datum);
      d.setDate(d.getDate() - dagen);
      return d.toLocaleDateString('nl-NL');
    }

    function render() {
      const vakken = laad();
      const vandaag = new Date();
      vandaag.setHours(0, 0, 0, 0);

      const items = [];
      vakken.forEach(v => {
        v.toetsen.forEach(t => {
          items.push({ vak: v.naam, moeilijkheid: v.moeilijkheid, toets: t });
        });
      });

      items.sort((a, b) => {
        if (!a.toets.datum && !b.toets.datum) return 0;
        if (!a.toets.datum) return 1;
        if (!b.toets.datum) return -1;
        return new Date(a.toets.datum) - new Date(b.toets.datum);
      });

      const lijst = document.getElementById('lijst');

      if (!items.length) {
        document.getElementById('leeg').style.display = '';
        lijst.innerHTML = '';
        return;
      }

      lijst.innerHTML = items.map(r => {
        const verlopen = r.toets.datum && new Date(r.toets.datum) < vandaag;
        const begin = berekenBeginDatum(r.toets.datum, r.moeilijkheid);
        return `
          <div class="toets-kaart${verlopen ? ' verlopen' : ''}">
            <div class="kaart-vak">${r.vak}</div>
            <div class="kaart-meta">
              <span class="toets-naam-badge">${r.toets.naam}</span>
              <span class="toets-datum">${formatDatum(r.toets.datum)}</span>
            </div>
            ${begin ? `<div class="leeradvies">📚 Begin op ${begin}</div>` : ''}
          </div>`;
      }).join('');
    }

    render();
  </script>
</body>
</html>
