<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Afspraken – Struct</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3ddc97">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Struct">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 90px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }

    .btn-nieuw {
      width: 38px; height: 38px;
      background: #3ddc97; border: none; border-radius: 10px;
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-nieuw:hover  { background: #2bc47e; }
    .btn-nieuw:active { background: #23a96a; }

    /* ── Formulier ── */
    .form-wrapper {
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .form-h2 { font-size: 1rem; font-weight: 700; margin: 0 0 18px; }

    .form-label {
      display: block;
      font-size: 0.75rem; font-weight: 700;
      color: #999; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .optioneel { font-weight: 400; color: #c0c0c0; text-transform: none; letter-spacing: 0; }

    .form-input {
      width: 100%;
      background: #fff; border: 1.5px solid #e8e8e8;
      border-radius: 10px; color: #1a1a1a;
      font-size: 0.95rem; padding: 11px 14px;
      margin-bottom: 16px; outline: none;
      font-family: inherit; appearance: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #3ddc97; }

    .form-rij { display: flex; gap: 10px; }
    .form-rij .form-kolom { flex: 1; }
    .form-rij .form-kolom .form-input { margin-bottom: 16px; }

    /* Categorie pills */
    .cat-keuze { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .cat-radio { display: none; }
    .cat-radio-label {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      border: 1.5px solid #e8e8e8; border-radius: 8px;
      cursor: pointer; font-size: 0.82rem; color: #6b6b6b;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .cat-radio:checked + .cat-radio-label {
      border-color: var(--kleur);
      background: var(--kleur-bg);
      color: #1a1a1a; font-weight: 600;
    }
    .cat-dot-klein { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Herhaling segmented */
    .segmented {
      display: flex; background: #eee;
      border-radius: 10px; padding: 3px; margin-bottom: 18px;
    }
    .seg-radio { display: none; }
    .seg-label {
      flex: 1; text-align: center; padding: 9px 6px;
      border-radius: 8px; font-size: 0.85rem;
      cursor: pointer; color: #888;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .seg-radio:checked + .seg-label {
      background: #fff; color: #1a1a1a; font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .form-footer { display: flex; gap: 10px; }
    .btn-annuleer {
      padding: 12px 18px; background: none;
      border: 1.5px solid #e0e0e0; border-radius: 10px;
      color: #888; font-size: 0.9rem; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
    }
    .btn-annuleer:hover { background: #f5f5f5; }
    .btn-opslaan {
      flex: 1; padding: 12px; background: #3ddc97;
      border: none; border-radius: 10px;
      color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-opslaan:hover { background: #2bc47e; }

    /* ── Lijst ── */
    .cat-groep { margin-bottom: 28px; }
    .cat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .cat-dot-groot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cat-naam {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.9px; color: #888;
    }
    .cat-teller {
      font-size: 0.7rem; color: #aaa;
      background: #f0f0f0; border-radius: 20px; padding: 1px 8px;
    }

    .afspraak-kaart {
      background: #fafafa; border: 1px solid #ebebeb;
      border-left: 4px solid;
      border-radius: 12px;
      padding: 12px 10px 12px 14px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    .afspraak-kaart.afgerond { opacity: 0.4; }
    .afspraak-kaart.afgerond .a-titel { text-decoration: line-through; color: #aaa; }

    .a-body { flex: 1; min-width: 0; cursor: pointer; }
    .a-titel {
      font-size: 0.95rem; font-weight: 700; color: #1a1a1a;
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .a-meta { font-size: 0.8rem; color: #999; }

    .a-acties { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
    .actie-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .actie-btn:hover { background: #f0f0f0; }
    .actie-vink  { color: #2bc47e; }
    .actie-kruis { color: #e05252; }

    .leeg { text-align: center; color: #bbb; padding: 60px 0 40px; font-size: 0.95rem; }

    /* ── Tabbar ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 1px solid #ebebeb;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #bbb;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #3ddc97; }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>
<body>

    <h1>Afspraken</h1>
    <button class="btn-nieuw" id="btn-nieuw" aria-label="Nieuwe afspraak" onclick="toonForm()">

    </button>

  <!-- Formulier -->

    <label class="form-label" for="f-datum">Datum</label>

    <div class="form-rij">

      </div>

    <label class="form-label">Categorie</label>
    <div class="cat-keuze">
      <input type="radio" name="cat" id="cat-sociaal"    value="sociaal"    class="cat-radio">
      <label for="cat-sociaal"    class="cat-radio-label" style="--kleur:#9b59b6;--kleur-bg:#f7f0fc"><span class="cat-dot-klein" style="background:#9b59b6"></span>Sociaal</label>

      <input type="radio" name="cat" id="cat-sport"      value="sport"      class="cat-radio">
      <label for="cat-sport"      class="cat-radio-label" style="--kleur:#3498db;--kleur-bg:#edf5ff"><span class="cat-dot-klein" style="background:#3498db"></span>Sport/Hobby</label>

      <input type="radio" name="cat" id="cat-werk"       value="werk"       class="cat-radio">
      <label for="cat-werk"       class="cat-radio-label" style="--kleur:#e67e22;--kleur-bg:#fff5eb"><span class="cat-dot-klein" style="background:#e67e22"></span>Werk</label>

      <input type="radio" name="cat" id="cat-gezondheid" value="gezondheid" class="cat-radio">
      <label for="cat-gezondheid" class="cat-radio-label" style="--kleur:#e74c3c;--kleur-bg:#fff0ef"><span class="cat-dot-klein" style="background:#e74c3c"></span>Gezondheid</label>

      <input type="radio" name="cat" id="cat-overig"     value="overig"     class="cat-radio" checked>
      <label for="cat-overig"     class="cat-radio-label" style="--kleur:#888;--kleur-bg:#f2f2f2"><span class="cat-dot-klein" style="background:#888"></span>Overig</label>
    </div>

    <label class="form-label">Herhaling</label>
    <div class="segmented">
      <input type="radio" name="herhaling" id="h-eenmalig"  value="eenmalig"  class="seg-radio" checked>
      <label for="h-eenmalig"  class="seg-label">Eenmalig</label>
      <input type="radio" name="herhaling" id="h-wekelijks" value="wekelijks" class="seg-radio">
      <label for="h-wekelijks" class="seg-label">Wekelijks</label>
    </div>

    <div class="form-footer">
      <button class="btn-annuleer" onclick="verbergForm()">Annuleren</button>
      <button class="btn-opslaan"  onclick="opslaan()">Opslaan</button>
    </div>
  </div>

  <!-- Lijst -->
  <div id="afspraken-lijst"></div>

  <!-- Tabbar -->
  <nav class="tabbar">

      <span class="tab-icoon">
        <svg class="icoon-outline" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11L12 3L21 11V21H15V16H9V21H3V11Z"/></svg>

  <script>
    const CATEGORIEEN = [
      { id: 'sociaal',    label: 'Sociaal',     kleur: '#9b59b6' },
      { id: 'sport',      label: 'Sport/Hobby', kleur: '#3498db' },
      { id: 'werk',       label: 'Werk',        kleur: '#e67e22' },
      { id: 'gezondheid', label: 'Gezondheid',  kleur: '#e74c3c' },
      { id: 'overig',     label: 'Overig',      kleur: '#888888' },
    ];
    const DAG_NAMEN = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];

    function getCat(id) { return CATEGORIEEN.find(c => c.id === id) || CATEGORIEEN[4]; }
    function laad()     { return JSON.parse(localStorage.getItem('afspraken') || '[]'); }
    function slaOp(l)   { localStorage.setItem('afspraken', JSON.stringify(l)); }
    function vandaagStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatDatum(str) {
      return new Date(str + 'T00:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
    }

    // ── Formulier ──
    let bewerkenId = null;

    function toonForm(afspraak = null) {
      bewerkenId = afspraak ? afspraak.id : null;
      document.getElementById('form-h2').textContent = afspraak ? 'Afspraak bewerken' : 'Nieuwe afspraak';
      document.getElementById('f-titel').value = afspraak?.titel || '';
      document.getElementById('f-datum').value = afspraak?.datum || '';
      document.getElementById('f-tijd').value     = afspraak?.tijd     || '';
      document.getElementById('f-eindtijd').value = afspraak?.eindtijd || '';
      const cat = afspraak?.categorie || 'overig';
      document.querySelector(`input[name="cat"][value="${cat}"]`).checked = true;
      const herh = afspraak?.herhaling || 'eenmalig';
      document.querySelector(`input[name="herhaling"][value="${herh}"]`).checked = true;
      document.getElementById('form-wrapper').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      document.getElementById('f-titel').focus();
    }

    function verbergForm() {
      bewerkenId = null;
      document.getElementById('form-wrapper').style.display = 'none';
    }

    function opslaan() {
      const titel = document.getElementById('f-titel').value.trim();
      const datum = document.getElementById('f-datum').value;
      if (!titel) { document.getElementById('f-titel').focus(); return; }
      if (!datum) { document.getElementById('f-datum').focus(); return; }

      const afspraak = {
        id:        bewerkenId || Date.now().toString(),
        titel,
        datum,
        tijd:      document.getElementById('f-tijd').value     || '',
        eindtijd:  document.getElementById('f-eindtijd').value || '',
        categorie: document.querySelector('input[name="cat"]:checked')?.value || 'overig',
        herhaling: document.querySelector('input[name="herhaling"]:checked')?.value || 'eenmalig',
        afgerond:  false,
      };

      const lijst = laad();
      if (bewerkenId) {
        const idx = lijst.findIndex(a => a.id === bewerkenId);
        if (idx >= 0) lijst[idx] = { ...lijst[idx], ...afspraak };
      } else {
        lijst.push(afspraak);
      }
      slaOp(lijst);
      verbergForm();
      render();
    }

    function rondsAf(id) {
      const lijst = laad();
      const a = lijst.find(a => a.id === id);
      if (a) a.afgerond = true;
      slaOp(lijst);
      render();
    }

    function verwijder(id) {
      if (!confirm('Afspraak verwijderen?')) return;
      slaOp(laad().filter(a => a.id !== id));
      render();
    }

    function bewerk(id) {
      const a = laad().find(a => a.id === id);
      if (a) toonForm(a);
    }

    // ── Render ──
    function render() {
      const vandaag = vandaagStr();
      const lijst = laad().filter(a => {
        if (a.afgerond && a.herhaling === 'eenmalig' && a.datum < vandaag) return false;
        if (a.afgerond && a.herhaling === 'wekelijks') return false;
        return true;
      });

      const container = document.getElementById('afspraken-lijst');
      if (!lijst.length) {
        container.innerHTML = `<div class="leeg">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3ddc97" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 14px"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Nog geen afspraken —<br>tik + om er een toe te voegen
        </div>`;
        return;
      }

      let html = '';
      for (const cat of CATEGORIEEN) {
        const items = lijst
          .filter(a => a.categorie === cat.id)
          .sort((a, b) => a.datum.localeCompare(b.datum));
        if (!items.length) continue;
        html += `<div class="cat-groep">
          <div class="cat-header">
            <span class="cat-dot-groot" style="background:${cat.kleur}"></span>
            <span class="cat-naam">${cat.label}</span>
            <span class="cat-teller">${items.length}</span>
          </div>
          ${items.map(a => kaartHtml(a, cat.kleur)).join('')}
        </div>`;
      }
      container.innerHTML = html;
    }

    function kaartHtml(a, kleur) {
      const datumTekst = a.herhaling === 'wekelijks'
        ? `Elke ${DAG_NAMEN[new Date(a.datum + 'T00:00:00').getDay()]}`
        : formatDatum(a.datum);
      const tijdTekst = a.tijd
        ? ` · ${a.tijd}${a.eindtijd ? ` – ${a.eindtijd}` : ''}`
        : '';
      const afgerondKlas = a.afgerond ? ' afgerond' : '';
      const vinkBtn = !a.afgerond
        ? `<button class="actie-btn actie-vink" onclick="rondsAf('${a.id}')" title="Markeer als gedaan">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
           </button>`
        : '';
      return `<div class="afspraak-kaart${afgerondKlas}" style="border-left-color:${kleur}">
        <div class="a-body" onclick="bewerk('${a.id}')">
          <div class="a-titel">${a.titel}</div>

            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>`;
    }

    render();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
