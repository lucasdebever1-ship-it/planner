<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="color-scheme" content="light">
  <title>Week – Struct</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3ddc97">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Struct">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 90px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; color: #1a1a1a; }

    /* Week navigatie */
    .week-nav {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .btn-week {
      flex-shrink: 0; width: 40px; height: 40px;
      background: #f5f5f5; border: 1px solid #e0e0e0;
      border-radius: 10px; color: #888; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-week:hover { color: #1a1a1a; border-color: #3ddc97; background: #edf8f3; }

    .week-bereik {
      flex: 1; text-align: center;
      font-size: 0.88rem; font-weight: 600; color: #6b6b6b;
    }

    /* Dag rij */
    .dag-rij {
      display: flex; gap: 3px; margin-bottom: 20px;
    }

    .dag-pill {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 9px 2px; border-radius: 12px; border: none;
      background: none; cursor: pointer; color: #bbb;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .dag-pill:active { opacity: 0.7; }
    .dag-pill.vandaag:not(.geselecteerd) { color: #3ddc97; }
    .dag-pill.geselecteerd { background: #3ddc97; color: #ffffff; }

    .dag-letter { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .dag-getal  { font-size: 1rem; font-weight: 700; line-height: 1; position: relative; }

    .dag-pill.vandaag:not(.geselecteerd) .dag-getal::after {
      content: '';
      position: absolute; bottom: -5px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px; border-radius: 50%;
      background: #3ddc97;
    }

    /* Dag inhoud */
    .dag-inhoud { display: flex; flex-direction: column; gap: 10px; }

    /* Kaarten */
    .kaart {
      border-radius: 14px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .kaart-toets    { background: #fff5f5; border: 1px solid #ffd0d0; }
    .kaart-huiswerk { background: #f0f5ff; border: 1px solid #c8d8ff; }
    .kaart-start    { background: #f0fbf5; border: 1px solid #b8efd3; }
    .kaart-bezig    { background: #f5f5f5; border: 1px solid #e8e8e8; }
    .kaart-afspraak { background: #fafafa; border: 1px solid #ebebeb; border-left-width: 4px; }
    .kaart-training { background: #f0fbf5; border: 1px solid #b8efd3; }
    .kaart-werk     { background: #fff8f0; border: 1px solid #ffd8a8; }

    .kaart-vak  { font-size: 0.98rem; font-weight: 800; color: #1a1a1a; }
    .kaart-naam { font-size: 0.8rem; color: #888; margin-top: 1px; }
    .kaart-status { font-size: 0.85rem; font-weight: 600; margin-top: 4px; }

    .kaart-toets    .kaart-status { color: #e05252; }
    .kaart-huiswerk .kaart-status { color: #3a6edc; }
    .kaart-start    .kaart-status { color: #2bc47e; }
    .kaart-bezig    .kaart-status { color: #888; font-weight: 400; }

    /* Toetsbanner (toets vandaag op de dag zelf) */
    .toets-banner {
      background: #fff8f0; border: 2px solid #f0c060;
      border-radius: 12px; padding: 18px 16px; text-align: center;
      box-shadow: 0 4px 16px rgba(240,192,64,0.15);
    }
    .banner-emoji { font-size: 2rem; line-height: 1; margin-bottom: 6px; }
    .banner-titel { font-size: 1.1rem; font-weight: 800; color: #c07820; letter-spacing: 0.07em; }
    .banner-vak   { font-size: 0.82rem; color: #b09060; margin-top: 5px; }

    /* Leeg */
    .leeg { text-align: center; color: #ccc; padding: 56px 0 36px; font-size: 1rem; }

    /* ── Navigatie ── */
    .hamburger-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 8px; border-radius: 8px;
      display: flex; flex-direction: column; gap: 5px; align-items: center;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .hamburger-btn:hover { background: #f0f0f0; }
    .hamburger-streep { display: block; width: 20px; height: 2px; background: #888; border-radius: 2px; }

    .menu-overlay { position: fixed; inset: 0; z-index: 200; display: none; }
    .menu-overlay.open { display: block; }
    .menu-achtergrond { position: absolute; inset: 0; }
    .menu-kaart {
      position: absolute; top: 52px; right: 20px;
      background: #ffffff; border: 1px solid #e8e8e8;
      border-radius: 12px; min-width: 210px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; text-decoration: none;
      color: #1a1a1a; font-size: 0.95rem;
      border: none; background: none; width: 100%;
      text-align: left; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s; font-family: inherit;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.rood { color: #e05252; }

    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 1px solid #ebebeb;
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; padding: 10px 4px 12px;
      text-decoration: none; color: #bbb;
      font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .tab:active { opacity: 0.7; }
    .tab.actief { color: #3ddc97; }
    .tab-icoon { display: flex; align-items: center; justify-content: center; }
    .tab .icoon-outline { display: block; }
    .tab .icoon-filled  { display: none; }
    .tab.actief .icoon-outline { display: none; }
    .tab.actief .icoon-filled  { display: block; }
  </style>
</head>
<body>

  <script>
    // Navigatie
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('menu-overlay').classList.toggle('open');
    });
    function sluitMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function resetProfiel() {
      sluitMenu();
      if (confirm('Wil je het profiel resetten? Alle gegevens worden verwijderd.')) {
        localStorage.clear(); location.replace('onboarding.html');
      }
    }

    const DAG_LETTERS  = ['zo','ma','di','wo','do','vr','za'];
    const MAAND_NAMEN  = ['januari','februari','maart','april','mei','juni','juli',
                          'augustus','september','oktober','november','december'];
    const STANDAARD_DAGEN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0,
                               Schrijfvaardigheid:2, PO:14, Anders:3 };
    const CAT_KLEUREN = { sociaal:'#9b59b6', sport:'#3498db', werk:'#e67e22', gezondheid:'#e74c3c', overig:'#888' };
    const CAT_LABELS  = { sociaal:'Sociaal', sport:'Sport/Hobby', werk:'Werk', gezondheid:'Gezondheid', overig:'Overig' };

    function normaliseer(d) { const r = new Date(d); r.setHours(0,0,0,0); return r; }
    function addDagen(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); r.setHours(0,0,0,0); return r; }

    function getMaandag(datum) {
      const d = normaliseer(datum);
      const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
      return addDagen(d, diff);
    }

    function toDatumStr(d) {
      const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    function parseDatum(str) { return normaliseer(new Date(str + 'T00:00:00')); }

    function weekBereikTekst(maandag) {
      const zondag = addDagen(maandag, 6);
      const jaar = zondag.getFullYear();
      if (maandag.getMonth() === zondag.getMonth()) {
        return `${maandag.getDate()} – ${zondag.getDate()} ${MAAND_NAMEN[maandag.getMonth()]} ${jaar}`;
      }
      return `${maandag.getDate()} ${MAAND_NAMEN[maandag.getMonth()]} – ${zondag.getDate()} ${MAAND_NAMEN[zondag.getMonth()]} ${jaar}`;
    }

    function getLeerDagen(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key  = type || 'Anders';
      const basis = inst[key] !== undefined ? inst[key]
        : (STANDAARD_DAGEN[key] !== undefined ? STANDAARD_DAGEN[key] : STANDAARD_DAGEN.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function berekenKaarten(dag) {
      const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');
      const dagMs  = dag.getTime();
      const toetsKaarten = [], hwKaarten = [], startKaarten = [], bezigKaarten = [];

      vakken.forEach(v => {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : []);
        toetsen.forEach(t => {
          if (!t.datum) return;
          const toetsDatum = parseDatum(t.datum);
          const leerDagen  = getLeerDagen(t.type, v.moeilijkheid);
          const beginDatum = leerDagen > 0 ? addDagen(toetsDatum, -leerDagen) : null;
          const dagenTot   = Math.round((toetsDatum - dag) / 86400000);
          if (toetsDatum.getTime() === dagMs) {
            toetsKaarten.push({ vak: v.naam, naam: t.naam, type: t.type });
          } else if (beginDatum && beginDatum.getTime() === dagMs) {
            startKaarten.push({ vak: v.naam, naam: t.naam, type: t.type, dagenTot });
          } else if (beginDatum && dag > beginDatum && dag < toetsDatum) {
            bezigKaarten.push({ vak: v.naam, naam: t.naam, type: t.type, dagenTot });
          }
        });

        (v.huiswerk || []).forEach(h => {
          if (!h.inleverdatum || h.gedaan === true) return;
          if (h.inleverdatum.slice(0,10) === toDatumStr(dag)) {
            hwKaarten.push({ vak: v.naam, omschrijving: h.omschrijving });
          }
        });
      });

      const afspraken = JSON.parse(localStorage.getItem('afspraken') || '[]');
      const dagStr = toDatumStr(dag);
      const afspraakKaarten = afspraken.filter(a => {
        if (a.afgerond) return false;
        if (a.herhaling === 'wekelijks') {
          return parseDatum(a.datum).getDay() === dag.getDay() && a.datum <= dagStr;
        }
        return a.datum === dagStr;
      });

      const trainingen = JSON.parse(localStorage.getItem('trainingen') || '[]');
      const trainingKaarten = trainingen.filter(t =>
        Array.isArray(t.dagen) && t.dagen.includes(dag.getDay())
      );

      const werk = JSON.parse(localStorage.getItem('werk') || '[]');
      const werkKaarten = werk.filter(w =>
        Array.isArray(w.dagen) && w.dagen.includes(dag.getDay())
      );

      return { toetsKaarten, hwKaarten, startKaarten, bezigKaarten, afspraakKaarten, trainingKaarten, werkKaarten };
    }

    // ── State ──
    const vandaag   = normaliseer(new Date());
    let weekMaandag = getMaandag(vandaag);
    let gekozenDag  = new Date(vandaag);

    const _dagParam = sessionStorage.getItem('week_dag');
    if (_dagParam) {
      gekozenDag  = parseDatum(_dagParam);
      weekMaandag = getMaandag(gekozenDag);
      sessionStorage.removeItem('week_dag');
    }

    function renderWeekNav() {
      document.getElementById('week-bereik').textContent = weekBereikTekst(weekMaandag);
    }

    function renderDagRij() {
      let html = '';
      for (let i = 0; i < 7; i++) {
        const dag = addDagen(weekMaandag, i);
        const isVandaag      = dag.getTime() === vandaag.getTime();
        const isGeselecteerd = dag.getTime() === gekozenDag.getTime();
        const klassen = ['dag-pill', isGeselecteerd ? 'geselecteerd' : '', isVandaag ? 'vandaag' : ''].filter(Boolean).join(' ');
        html += `<button class="${klassen}" data-dag="${toDatumStr(dag)}">
          <span class="dag-letter">${DAG_LETTERS[dag.getDay()]}</span>
          <span class="dag-getal">${dag.getDate()}</span>
        </button>`;
      }
      document.getElementById('dag-rij').innerHTML = html;
    }

    function renderDagInhoud() {
      const isVandaagGeselecteerd = gekozenDag.getTime() === vandaag.getTime();
      const { toetsKaarten, hwKaarten, startKaarten, bezigKaarten, afspraakKaarten, trainingKaarten, werkKaarten } = berekenKaarten(gekozenDag);
      let html = '';

      toetsKaarten.forEach(k => {
        if (isVandaagGeselecteerd) {
          html += `<div class="toets-banner">
            <div class="banner-emoji">📝</div>
            <div class="banner-titel">TOETS VANDAAG</div>
            <div class="banner-vak">${k.vak} — ${k.naam}</div>
          </div>`;
        } else {
          html += `<div class="kaart kaart-toets">
            <div class="kaart-vak">${k.vak}</div>
            ${k.naam ? `<div class="kaart-naam">${k.naam}${k.type ? ` · ${k.type}` : ''}</div>` : ''}
            <div class="kaart-status">📝 Toets</div>
          </div>`;
        }
      });

      hwKaarten.forEach(k => {
        html += `<div class="kaart kaart-huiswerk">
          <div class="kaart-vak">${k.vak}</div>
          <div class="kaart-naam">${k.omschrijving}</div>
          <div class="kaart-status">📋 Inleveren</div>
        </div>`;
      });

      startKaarten.forEach(k => {
        const over = k.dagenTot === 1 ? '1 dag' : `${k.dagenTot} dagen`;
        html += `<div class="kaart kaart-start">
          <div class="kaart-vak">${k.vak}</div>
          ${k.naam ? `<div class="kaart-naam">${k.naam}${k.type ? ` · ${k.type}` : ''}</div>` : ''}
          <div class="kaart-status">📚 Begin met leren · toets over ${over}</div>
        </div>`;
      });

      bezigKaarten.forEach(k => {
        const nog = k.dagenTot === 1 ? '1 dag' : `${k.dagenTot} dagen`;
        html += `<div class="kaart kaart-bezig">
          <div class="kaart-vak">${k.vak}</div>
          ${k.naam ? `<div class="kaart-naam">${k.naam}${k.type ? ` · ${k.type}` : ''}</div>` : ''}
          <div class="kaart-status">📚 Leren — nog ${nog} tot de toets</div>
        </div>`;
      });

      afspraakKaarten.forEach(a => {
        const kleur    = CAT_KLEUREN[a.categorie] || '#888';
        const catLabel = CAT_LABELS[a.categorie]  || 'Overig';
        const tijdStr  = a.tijd ? `${a.tijd} · ` : '';
        html += `<div class="kaart kaart-afspraak" style="border-left-color:${kleur}">
          <div class="kaart-vak">${a.titel}</div>
          <div class="kaart-naam">${tijdStr}${catLabel}</div>
        </div>`;
      });

      trainingKaarten.forEach(t => {
        html += `<div class="kaart kaart-training">
          <div class="kaart-vak">${t.naam}</div>
          ${t.tijd ? `<div class="kaart-naam">${t.tijd}</div>` : ''}
        </div>`;
      });

      werkKaarten.forEach(w => {
        const tijdTekst = w.beginTijd
          ? `${w.beginTijd}${w.eindTijd ? ` – ${w.eindTijd}` : ''}`
          : '';
        html += `<div class="kaart kaart-werk">
          <div class="kaart-vak">Werkdienst</div>
          ${tijdTekst ? `<div class="kaart-naam">${tijdTekst}</div>` : ''}
        </div>`;
      });

      if (!html) html = '<div class="leeg">Niets gepland vandaag 🎉</div>';
      document.getElementById('dag-inhoud').innerHTML = html;
    }

    function render() { renderWeekNav(); renderDagRij(); renderDagInhoud(); }

    function navigeerWeek(delta) {
      const dagInWeek = Math.round((gekozenDag - weekMaandag) / 86400000);
      weekMaandag = addDagen(weekMaandag, delta * 7);
      gekozenDag  = addDagen(weekMaandag, dagInWeek);
      render();
    }

    document.getElementById('btn-vorige').addEventListener('click', () => navigeerWeek(-1));
    document.getElementById('btn-volgende').addEventListener('click', () => navigeerWeek(1));

    document.getElementById('dag-rij').addEventListener('click', e => {
      const pill = e.target.closest('.dag-pill');
      if (!pill) return;
      gekozenDag = parseDatum(pill.dataset.dag);
      renderDagRij(); renderDagInhoud();
    });

    render();
  </script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
