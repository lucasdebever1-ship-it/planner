<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Weekkalender</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* Header */
    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }

    .btn-terug {
      background: #161616;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #4f8ef7;
      font-size: 0.85rem;
      padding: 7px 14px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-terug:hover { background: #192840; border-color: #4f8ef7; }

    /* Week navigatie */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-week {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #666;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-week:hover { color: #e8e8e8; border-color: #4f8ef7; }

    .week-bereik {
      flex: 1;
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      color: #aaa;
    }

    /* Dag rij */
    .dag-rij {
      display: flex;
      gap: 3px;
      margin-bottom: 20px;
    }

    .dag-pill {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 9px 2px;
      border-radius: 12px;
      border: none;
      background: none;
      cursor: pointer;
      color: #555;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .dag-pill:active { opacity: 0.7; }
    .dag-pill.vandaag:not(.geselecteerd) { color: #4f8ef7; }
    .dag-pill.geselecteerd { background: #4f8ef7; color: #fff; }

    .dag-letter {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .dag-getal {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      position: relative;
    }

    /* Stip onder vandaag als het niet geselecteerd is */
    .dag-pill.vandaag:not(.geselecteerd) .dag-getal::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #4f8ef7;
    }

    /* Dag inhoud */
    .dag-inhoud {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Kaarten */
    .kaart {
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .kaart-toets    { background: #1a0808; border: 1px solid #4a1515; }
    .kaart-huiswerk { background: #080f1a; border: 1px solid #1a2d4a; }
    .kaart-start    { background: #0a1f0f; border: 1px solid #1a3d22; }
    .kaart-bezig    { background: #141414; border: 1px solid #272727; }

    .kaart-vak  { font-size: 0.98rem; font-weight: 800; }
    .kaart-naam { font-size: 0.8rem; color: #555; margin-top: 1px; }
    .kaart-status { font-size: 0.85rem; font-weight: 600; margin-top: 4px; }

    .kaart-toets    .kaart-status { color: #e05252; }
    .kaart-huiswerk .kaart-status { color: #4f8ef7; }
    .kaart-start    .kaart-status { color: #3dcc7a; }
    .kaart-bezig    .kaart-status { color: #555; font-weight: 400; }

    /* Leeg */
    .leeg {
      text-align: center;
      color: #3a3a3a;
      padding: 56px 0 36px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="pagina-header">
    <h1>Weekkalender</h1>
    <a href="index.html" class="btn-terug">← Terug</a>
  </div>

  <div class="week-nav">
    <button class="btn-week" id="btn-vorige">‹</button>
    <div class="week-bereik" id="week-bereik"></div>
    <button class="btn-week" id="btn-volgende">›</button>
  </div>

  <div class="dag-rij" id="dag-rij"></div>
  <div class="dag-inhoud" id="dag-inhoud"></div>

  <script>
    const DAG_LETTERS  = ['zo','ma','di','wo','do','vr','za'];
    const MAAND_NAMEN  = ['januari','februari','maart','april','mei','juni','juli',
                          'augustus','september','oktober','november','december'];
    const STANDAARD_DAGEN = { Mondeling:7, Proefwerk:4, SO:1, Luistertoets:0,
                               Schrijfvaardigheid:2, PO:14, Anders:3 };

    // ── Datum helpers ──────────────────────────────────────────

    function normaliseer(d) {
      const r = new Date(d);
      r.setHours(0, 0, 0, 0);
      return r;
    }

    function addDagen(d, n) {
      const r = new Date(d);
      r.setDate(r.getDate() + n);
      r.setHours(0, 0, 0, 0);
      return r;
    }

    function getMaandag(datum) {
      const d = normaliseer(datum);
      const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
      return addDagen(d, diff);
    }

    function toDatumStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${dd}`;
    }

    function parseDatum(str) {
      return normaliseer(new Date(str + 'T00:00:00'));
    }

    function weekBereikTekst(maandag) {
      const zondag = addDagen(maandag, 6);
      const jaar = zondag.getFullYear();
      if (maandag.getMonth() === zondag.getMonth()) {
        return `${maandag.getDate()} – ${zondag.getDate()} ${MAAND_NAMEN[maandag.getMonth()]} ${jaar}`;
      }
      return `${maandag.getDate()} ${MAAND_NAMEN[maandag.getMonth()]} – ${zondag.getDate()} ${MAAND_NAMEN[zondag.getMonth()]} ${jaar}`;
    }

    // ── Data ───────────────────────────────────────────────────

    function getLeerDagen(type, moeilijkheid) {
      const inst = JSON.parse(localStorage.getItem('instellingen') || '{}');
      const key  = type || 'Anders';
      const basis = inst[key] !== undefined
        ? inst[key]
        : (STANDAARD_DAGEN[key] !== undefined ? STANDAARD_DAGEN[key] : STANDAARD_DAGEN.Anders);
      if (basis === 0) return 0;
      return Math.max(1, Math.round(basis * ((moeilijkheid || 5) / 5)));
    }

    function berekenKaarten(dag) {
      const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');
      const dagMs  = dag.getTime();

      const toetsKaarten = [], hwKaarten = [], startKaarten = [], bezigKaarten = [];

      vakken.forEach(v => {
        const toetsen = v.toetsen || (v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : []);

        toetsen.forEach(t => {
          if (!t.datum) return;
          const toetsDatum  = parseDatum(t.datum);
          const leerDagen   = getLeerDagen(t.type, v.moeilijkheid);
          const beginDatum  = leerDagen > 0 ? addDagen(toetsDatum, -leerDagen) : null;
          const dagenTot    = Math.round((toetsDatum - dag) / 86400000);

          if (toetsDatum.getTime() === dagMs) {
            toetsKaarten.push({ vak: v.naam, naam: t.naam, type: t.type });
          } else if (beginDatum && beginDatum.getTime() === dagMs) {
            startKaarten.push({ vak: v.naam, naam: t.naam, type: t.type, dagenTot });
          } else if (beginDatum && dag > beginDatum && dag < toetsDatum) {
            bezigKaarten.push({ vak: v.naam, naam: t.naam, type: t.type, dagenTot });
          }
        });

        (v.huiswerk || []).forEach(h => {
          if (!h.inleverdatum || h.gedaan) return;
          const hwDatum = parseDatum(h.inleverdatum);
          if (hwDatum.getTime() === dagMs) {
            hwKaarten.push({ vak: v.naam, omschrijving: h.omschrijving });
          }
        });
      });

      return { toetsKaarten, hwKaarten, startKaarten, bezigKaarten };
    }

    // ── State ──────────────────────────────────────────────────

    const vandaag   = normaliseer(new Date());
    let weekMaandag = getMaandag(vandaag);
    let gekozenDag  = new Date(vandaag);

    // ── Render ─────────────────────────────────────────────────

    function renderWeekNav() {
      document.getElementById('week-bereik').textContent = weekBereikTekst(weekMaandag);
    }

    function renderDagRij() {
      let html = '';
      for (let i = 0; i < 7; i++) {
        const dag = addDagen(weekMaandag, i);
        const isVandaag      = dag.getTime() === vandaag.getTime();
        const isGeselecteerd = dag.getTime() === gekozenDag.getTime();
        const klassen = ['dag-pill',
          isGeselecteerd ? 'geselecteerd' : '',
          isVandaag      ? 'vandaag'      : ''
        ].filter(Boolean).join(' ');

        html += `<button class="${klassen}" data-dag="${toDatumStr(dag)}">
          <span class="dag-letter">${DAG_LETTERS[dag.getDay()]}</span>
          <span class="dag-getal">${dag.getDate()}</span>
        </button>`;
      }
      document.getElementById('dag-rij').innerHTML = html;
    }

    function renderDagInhoud() {
      const { toetsKaarten, hwKaarten, startKaarten, bezigKaarten } = berekenKaarten(gekozenDag);
      let html = '';

      toetsKaarten.forEach(k => {
        html += `<div class="kaart kaart-toets">
          <div class="kaart-vak">${k.vak}</div>
          ${k.naam ? `<div class="kaart-naam">${k.naam}${k.type ? ` · ${k.type}` : ''}</div>` : ''}
          <div class="kaart-status">📝 Toets</div>
        </div>`;
      });

      hwKaarten.forEach(k => {
        html += `<div class="kaart kaart-huiswerk">
          <div class="kaart-vak">${k.vak}</div>
          <div class="kaart-naam">${k.omschrijving}</div>
          <div class="kaart-status">📋 Inleveren</div>
        </div>`;
      });

      startKaarten.forEach(k => {
        const over = k.dagenTot === 1 ? '1 dag' : `${k.dagenTot} dagen`;
        html += `<div class="kaart kaart-start">
          <div class="kaart-vak">${k.vak}</div>
          ${k.naam ? `<div class="kaart-naam">${k.naam}${k.type ? ` · ${k.type}` : ''}</div>` : ''}
          <div class="kaart-status">📚 Begin met leren · toets over ${over}</div>
        </div>`;
      });

      bezigKaarten.forEach(k => {
        const nog = k.dagenTot === 1 ? '1 dag' : `${k.dagenTot} dagen`;
        html += `<div class="kaart kaart-bezig">
          <div class="kaart-vak">${k.vak}</div>
          ${k.naam ? `<div class="kaart-naam">${k.naam}${k.type ? ` · ${k.type}` : ''}</div>` : ''}
          <div class="kaart-status">📚 Leren — nog ${nog} tot de toets</div>
        </div>`;
      });

      if (!html) html = '<div class="leeg">Niets gepland vandaag 🎉</div>';
      document.getElementById('dag-inhoud').innerHTML = html;
    }

    function render() {
      renderWeekNav();
      renderDagRij();
      renderDagInhoud();
    }

    // ── Events ─────────────────────────────────────────────────

    function navigeerWeek(delta) {
      const dagInWeek = Math.round((gekozenDag - weekMaandag) / 86400000);
      weekMaandag = addDagen(weekMaandag, delta * 7);
      gekozenDag  = addDagen(weekMaandag, dagInWeek);
      render();
    }

    document.getElementById('btn-vorige').addEventListener('click', () => navigeerWeek(-1));
    document.getElementById('btn-volgende').addEventListener('click', () => navigeerWeek(1));

    document.getElementById('dag-rij').addEventListener('click', e => {
      const pill = e.target.closest('.dag-pill');
      if (!pill) return;
      gekozenDag = parseDatum(pill.dataset.dag);
      renderDagRij();
      renderDagInhoud();
    });

    render();
  </script>
</body>
</html>
