<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Weekoverzicht</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .pagina-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }
    .pagina-header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }

    .btn-terug {
      background: #161616;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #4f8ef7;
      font-size: 0.85rem;
      padding: 7px 14px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-terug:hover { background: #192840; border-color: #4f8ef7; }

    #week-lijst {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dag-kaart {
      background: #161616;
      border: 1px solid #242424;
      border-radius: 16px;
      padding: 16px 18px;
    }

    .dag-kaart.vandaag        { border-color: #4f8ef7; background: #0f1a2e; }

    /* Gekleurde dagrand — staan na .vandaag zodat ze die overschrijven */
    .dag-kaart.alleen-leren       { border-color: #353535; }
    .dag-kaart.heeft-start        { border-color: #2a7a45; }
    .dag-kaart.heeft-toets-morgen { border-color: #c87020; }
    .dag-kaart.heeft-toets-vandaag { border-color: #cc3333; background: #1a0808; }
    .dag-kaart.vandaag.heeft-toets-vandaag { background: #200a0a; }

    .dag-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dag-naam  { font-size: 1rem; font-weight: 800; letter-spacing: -0.1px; }
    .dag-datum { font-size: 0.85rem; color: #555; }

    .vandaag-chip {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #4f8ef7;
      background: #192840;
      border-radius: 20px;
      padding: 2px 8px;
    }

    .dag-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dag-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #1a1a1a;
    }

    .dag-item.start { background: #0f1f12; border: 1px solid #1a3d22; }
    .dag-item.bezig { background: #141414; border: 1px solid #1e1e1e; }

    .item-vak       { font-size: 0.95rem; font-weight: 700; }
    .item-toetsnaam { font-size: 0.8rem; color: #666; }

    .item-status-start { font-size: 0.85rem; color: #3dcc7a; font-weight: 600; margin-top: 2px; }
    .item-status-bezig { font-size: 0.85rem; color: #888; margin-top: 2px; }

    /* Grote toetsbanner */
    .toets-banner {
      background: linear-gradient(135deg, #2a1800, #1a1000);
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 0 28px rgba(240, 192, 64, 0.12);
    }
    .banner-emoji { font-size: 2rem; line-height: 1; margin-bottom: 6px; }
    .banner-titel { font-size: 1.1rem; font-weight: 800; color: #f0c040; letter-spacing: 0.07em; }
    .banner-vak   { font-size: 0.82rem; color: #9a7a30; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="pagina-header">
    <h1>Deze week</h1>
    <a href="index.html" class="btn-terug">← Terug</a>
  </div>

  <div id="week-lijst"></div>

  <script>
    const dagNamen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
    const maandNamen = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

    function leerMultiplier() {
      const profiel = JSON.parse(localStorage.getItem('profiel') || '{}');
      return ['VWO 5','VWO 6','HAVO 4','HAVO 5'].includes(profiel.niveau) ? 1.5 : 1;
    }

    function dagenTussen(a, b) {
      return Math.round((b - a) / 86400000);
    }

    function datumString(d) {
      return d.getDate() + ' ' + maandNamen[d.getMonth()];
    }

    const multiplier = leerMultiplier();
    const vakken = JSON.parse(localStorage.getItem('vakken') || '[]');

    const alleToetsen = [];
    vakken.forEach(v => {
      const toetsen = v.toetsen || (v.toetsdatum ? [{ naam: 'Toets', datum: v.toetsdatum }] : []);
      toetsen.forEach(t => {
        if (!t.datum) return;
        const toetsDatum = new Date(t.datum);
        toetsDatum.setHours(0, 0, 0, 0);
        const startDagen = Math.round((v.moeilijkheid / 2 + 1) * multiplier);
        const beginDatum = new Date(toetsDatum);
        beginDatum.setDate(beginDatum.getDate() - startDagen);
        alleToetsen.push({ vak: v.naam, toets: t, toetsDatum, beginDatum });
      });
    });

    const vandaag = new Date();
    vandaag.setHours(0, 0, 0, 0);

    const lijst = document.getElementById('week-lijst');
    let html = '';

    for (let i = 0; i < 7; i++) {
      const dag = new Date(vandaag);
      dag.setDate(dag.getDate() + i);

      const isVandaag = i === 0;

      const toetsItems = [], startItems = [], bezigItems = [];

      alleToetsen.forEach(r => {
        const opToetsDag = dagenTussen(dag, r.toetsDatum) === 0;
        const opBeginDag = dagenTussen(dag, r.beginDatum) === 0;
        const bezig      = dag > r.beginDatum && dag < r.toetsDatum;

        if (opToetsDag)       toetsItems.push(r);
        else if (opBeginDag)  startItems.push(r);
        else if (bezig)       bezigItems.push(r);
      });

      // Vrije dag: weglaten
      if (!toetsItems.length && !startItems.length && !bezigItems.length) continue;

      // Bepaal randklasse (prioriteit: toets vandaag > toets morgen > start > alleen leren)
      let randKlasse;
      if (toetsItems.length) {
        randKlasse = 'heeft-toets-vandaag';
      } else {
        const morgen = new Date(dag);
        morgen.setDate(morgen.getDate() + 1);
        const heeftToetsMorgen = alleToetsen.some(r => dagenTussen(morgen, r.toetsDatum) === 0);
        if (heeftToetsMorgen)   randKlasse = 'heeft-toets-morgen';
        else if (startItems.length) randKlasse = 'heeft-start';
        else                    randKlasse = 'alleen-leren';
      }

      const kaartKlassen = ['dag-kaart', isVandaag ? 'vandaag' : '', randKlasse].filter(Boolean).join(' ');
      const vandaagChip  = isVandaag ? '<span class="vandaag-chip">vandaag</span>' : '';

      html += `
        <div class="${kaartKlassen}">
          <div class="dag-header">
            <span class="dag-naam">${dagNamen[dag.getDay()]}</span>
            <span class="dag-datum">${datumString(dag)}</span>
            ${vandaagChip}
          </div>
          <div class="dag-items">`;

      toetsItems.forEach(r => {
        html += `
            <div class="toets-banner">
              <div class="banner-emoji">📝</div>
              <div class="banner-titel">TOETS VANDAAG</div>
              <div class="banner-vak">${r.vak} — ${r.toets.naam}</div>
            </div>`;
      });

      startItems.forEach(r => {
        html += `
            <div class="dag-item start">
              <span class="item-vak">${r.vak}</span>
              <span class="item-toetsnaam">${r.toets.naam}</span>
              <span class="item-status-start">📚 Start vandaag met leren</span>
            </div>`;
      });

      bezigItems.forEach(r => {
        const dagenTot = dagenTussen(dag, r.toetsDatum);
        html += `
            <div class="dag-item bezig">
              <span class="item-vak">${r.vak}</span>
              <span class="item-toetsnaam">${r.toets.naam}</span>
              <span class="item-status-bezig">📚 Leren — nog ${dagenTot} dag${dagenTot === 1 ? '' : 'en'} tot de toets</span>
            </div>`;
      });

      html += `
          </div>
        </div>`;
    }

    lijst.innerHTML = html;
  </script>
</body>
</html>
